name: Backfill alte Fahrten (Wahoo)

# EINMALIG manuell auszufuehren. Fuellt Startzeit + fehlende Metadaten alter
# Strava-Fahrten aus Wahoo-FITs nach. Standard: Trockenlauf (schreibt nichts).
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'dry = nur anzeigen, write = schreiben + committen'
        required: true
        default: 'dry'
        type: choice
        options:
          - dry
          - write

concurrency:
  group: fetch-training-data      # gleiche Gruppe wie Haupt-Fetch, kein Parallel-Schreiben
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30            # Backfill laedt viele FITs, braucht laenger
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: echo "keine Extra-Dependencies noetig"

      - name: Refresh Wahoo Token
        id: wahoo_token
        run: |
          RESPONSE=$(curl -s --retry 3 --retry-delay 5 -X POST https://api.wahooligan.com/oauth/token \
            -d client_id=${{ secrets.WAHOO_CLIENT_ID }} \
            -d client_secret=${{ secrets.WAHOO_CLIENT_SECRET }} \
            -d refresh_token=${{ secrets.WAHOO_REFRESH_TOKEN }} \
            -d grant_type=refresh_token)
          ACCESS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null || echo "")
          NEW_REFRESH=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('refresh_token',''))" 2>/dev/null || echo "")
          echo "wahoo_access=$ACCESS" >> $GITHUB_OUTPUT
          echo "WAHOO_NEW_REFRESH=$NEW_REFRESH" >> $GITHUB_ENV

      - name: Update Wahoo Refresh Token
        if: env.WAHOO_NEW_REFRESH != ''
        continue-on-error: true
        run: gh secret set WAHOO_REFRESH_TOKEN --body "$WAHOO_NEW_REFRESH"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Run Backfill
        run: python3 scripts/backfill_wahoo.py
        env:
          WAHOO_ACCESS_TOKEN: ${{ steps.wahoo_token.outputs.wahoo_access }}
          BACKFILL_MODE: ${{ github.event.inputs.mode }}

      - name: Commit (nur im write-Modus)
        if: github.event.inputs.mode == 'write'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/activities.json
          if git diff --staged --quiet; then
            echo "Keine Aenderungen"
          else
            git commit -m "backfill: Startzeiten+Metadaten alter Fahrten aus Wahoo-FITs"
            git pull --rebase -X ours origin main || git rebase --abort
            git push || (git pull --rebase -X ours origin main && git push)
          fi
