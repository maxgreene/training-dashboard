name: Fetch Training Data
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Refresh Strava Token
        id: token
        run: |
          RESPONSE=$(curl -s -X POST https://www.strava.com/oauth/token \
            -d client_id=${{ secrets.STRAVA_CLIENT_ID }} \
            -d client_secret=${{ secrets.STRAVA_CLIENT_SECRET }} \
            -d refresh_token=${{ secrets.STRAVA_REFRESH_TOKEN }} \
            -d grant_type=refresh_token)
          ACCESS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          NEW_REFRESH=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['refresh_token'])")
          echo "access_token=$ACCESS" >> $GITHUB_OUTPUT
          echo "NEW_REFRESH=$NEW_REFRESH" >> $GITHUB_ENV
      - name: Update Strava Refresh Token
        run: gh secret set STRAVA_REFRESH_TOKEN --body "$NEW_REFRESH"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
      - name: Fetch Activities
        run: python3 scripts/fetch_activities.py
        env:
          STRAVA_ACCESS_TOKEN: ${{ steps.token.outputs.access_token }}
          WAHOO_REFRESH_TOKEN: ${{ secrets.WAHOO_REFRESH_TOKEN }}
      - name: Analyze Activities
        run: python3 scripts/analyze_activities.py
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "update training data $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase origin main
          git push
