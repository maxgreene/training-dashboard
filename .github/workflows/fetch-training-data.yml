name: Fetch Training Data
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: fetch-training-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install garth fitparse

      - name: Refresh Wahoo Token
        id: wahoo_token
        run: |
          RESPONSE=$(curl -s --retry 3 --retry-delay 5 -X POST https://api.wahooligan.com/oauth/token \
            -d client_id=${{ secrets.WAHOO_CLIENT_ID }} \
            -d client_secret=${{ secrets.WAHOO_CLIENT_SECRET }} \
            -d refresh_token=${{ secrets.WAHOO_REFRESH_TOKEN }} \
            -d grant_type=refresh_token)
          ACCESS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null || echo "")
          NEW_REFRESH=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('refresh_token',''))" 2>/dev/null || echo "")
          echo "wahoo_access=$ACCESS" >> $GITHUB_OUTPUT
          echo "WAHOO_NEW_REFRESH=$NEW_REFRESH" >> $GITHUB_ENV

      - name: Update Wahoo Refresh Token
        if: env.WAHOO_NEW_REFRESH != ''
        continue-on-error: true
        run: gh secret set WAHOO_REFRESH_TOKEN --body "$WAHOO_NEW_REFRESH"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Fetch Activities
        run: python3 scripts/fetch_activities.py
        env:
          WAHOO_ACCESS_TOKEN: ${{ steps.wahoo_token.outputs.wahoo_access }}

      - name: Analyze Activities
        run: python3 scripts/analyze_activities.py

      - name: Fetch Garmin Health
        id: garmin
        continue-on-error: true
        run: python3 scripts/fetch_garmin.py
        env:
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}

      - name: Update Garmin Token Secret
        if: steps.garmin.outputs.garmin_tokens != ''
        continue-on-error: true
        run: gh secret set GARMIN_TOKENS --body "${{ steps.garmin.outputs.garmin_tokens }}"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Keine Aenderungen zu committen"
          else
            git commit -m "update training data $(date -u +%Y-%m-%dT%H:%M)"
            git pull --rebase -X ours origin main || git rebase --abort
            git push || (git pull --rebase -X ours origin main && git push)
          fi
