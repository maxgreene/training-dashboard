<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Dashboard · Wolf</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --bg:#181818; --bg2:#1e1e1e; --bg3:#111;
  --border:#282828; --border2:#222;
  --t1:#f0f0f0; --t2:#b0b0b0; --t3:#888; --t4:#777; --t5:#666;
  --active:#e0e0e0;
  --green:#5a8a52; --red:#a08080;
  --z1:#34d399; --z2:#60a5fa; --z3:#fbbf24; --z4:#f97316; --z5:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#141414;color:var(--t1);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}

/* NAV */
nav{background:var(--bg3);height:52px;display:flex;align-items:center;padding:0 20px;gap:32px;border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:100;}
.nav-brand{font-size:13px;font-weight:600;color:var(--t1);}
.nav-tabs{display:flex;margin-left:auto;}
.tab{font-size:11px;font-weight:500;color:var(--t5);padding:0 16px;height:52px;display:flex;align-items:center;letter-spacing:0.8px;text-transform:uppercase;border-bottom:2px solid transparent;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif;transition:color 0.15s;}
.tab:hover:not(.active){color:var(--t3);}
.tab.active{color:var(--active);border-bottom-color:var(--active);}
.nav-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t4);}

/* LAYOUT */
main{padding:20px;max-width:1000px;margin:0 auto;}
.page{display:none;}.page.active{display:block;}
#loading{text-align:center;padding:60px 20px;color:var(--t4);font-family:'JetBrains Mono',monospace;font-size:12px;}

/* STATS */
.stats{display:flex;gap:6px;margin-bottom:24px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:14px 18px;flex:1;}
.stat-label{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px;}
.stat-val{font-size:23px;font-weight:700;color:var(--t1);line-height:1;}
.stat-val span{font-size:13px;font-weight:400;color:var(--t5);margin-left:2px;}
.stat-sub{font-size:11px;color:var(--t5);margin-top:4px;}

/* SECTION HEADER */
.sh{display:flex;align-items:baseline;gap:12px;margin-bottom:10px;margin-top:20px;}
.sh-title{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap;}
.sh-meta{font-size:12px;color:var(--t4);}
.sh-line{flex:1;height:1px;background:#252525;}

/* ACTIVITY LIST */
.act-list{display:flex;flex-direction:column;gap:2px;margin-bottom:24px;}
.act-row{background:var(--bg2);border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:border-color 0.15s;}
.act-row:hover{border-color:#444;}
.act-row.selected{border-color:#666;}
.act-main{padding:12px 16px;display:flex;align-items:center;gap:16px;}
.act-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t4);width:104px;flex-shrink:0;}
.act-name{font-size:13px;font-weight:500;color:var(--t1);flex:1;}
.act-metrics{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.am{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--t2);white-space:nowrap;}
.am .u{color:var(--t5);font-size:11px;}
.asep{color:#333;font-size:12px;}
.act-badge{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;color:var(--t5);background:#252525;border:1px solid #2e2e2e;padding:2px 7px;border-radius:2px;white-space:nowrap;}
.zstrip{height:2px;display:flex;gap:1px;border-radius:0 0 2px 2px;overflow:hidden;}
.zs{border-radius:1px;}

/* CALENDAR */
.cal-week{margin-bottom:16px;}
.cal-week-hdr{display:flex;align-items:baseline;gap:12px;margin-bottom:8px;}
.cwl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;}
.cwd{font-size:12px;color:var(--t4);}
.cwv{font-size:12px;color:var(--t4);margin-left:auto;}
.cwline{flex:1;height:1px;background:#252525;}
.dow-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
.dow-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--t4);text-align:center;padding:2px 0;}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.day-card{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:10px;min-height:96px;cursor:pointer;transition:border-color 0.15s;position:relative;}
.day-card:hover{border-color:#444;}
.day-card.done{background:#1a1e1a;border-color:#263026;}
.day-card.dimmed{opacity:0.25;cursor:default;}
.day-card.past{opacity:0.15;cursor:default;}
.day-card.today-c{border-color:var(--t3);}
.day-card.sel{border-color:#666;border-width:2px;}
.dc-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t4);margin-bottom:6px;}
.dc-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--t3);margin-bottom:5px;}
.dc-type.rest{color:var(--t5);font-weight:500;}
.dc-type.test{color:var(--red);}
.dc-type.check{color:var(--t3);}
.dc-title{font-size:12px;font-weight:500;color:var(--t2);line-height:1.35;}
.dc-detail{font-size:11px;color:var(--t3);margin-top:4px;line-height:1.35;}
.dc-done{font-size:10px;font-weight:600;color:var(--green);margin-top:5px;}

/* WEEK DETAIL */
.week-detail{background:#161616;border:1px solid #333;border-radius:4px;padding:16px;margin-top:6px;display:none;}
.week-detail.open{display:block;}
.wd-title{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:12px;}

/* DETAIL STATS */
.detail-stats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.ds{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:10px 14px;flex:1;min-width:80px;}
.ds-label{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;}
.ds-val{font-size:18px;font-weight:700;color:var(--t1);}
.ds-val span{font-size:12px;font-weight:400;color:var(--t4);}
.ds-sub{font-size:11px;color:var(--t5);margin-top:3px;}

/* POWER CURVE */
.pcurve{display:flex;align-items:flex-end;gap:4px;height:70px;margin:8px 0 12px;}
.pcb-w{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.pcb{width:100%;border-radius:2px 2px 0 0;opacity:0.85;}
.pcb-val{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t1);text-align:center;}
.pcb-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t4);text-align:center;}

/* ZONE BARS */
.zone-dist{display:flex;flex-direction:column;gap:5px;margin:8px 0 12px;}
.zd-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.zd-lbl{font-size:10px;color:var(--t3);width:72px;flex-shrink:0;}
.zd-bounds{font-size:9px;color:var(--t4);width:66px;font-family:'JetBrains Mono',monospace;flex-shrink:0;}
.zd-bg{flex:1;background:#252525;border-radius:2px;height:5px;}
.zd-bar{height:5px;border-radius:2px;}
.zd-pct{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t4);width:32px;text-align:right;}
.zd-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);width:44px;text-align:right;}
.pcb-pct{font-size:8px;color:var(--t4);text-align:center;margin-top:1px;}

/* CHART */
.chart-wrap{position:relative;margin-bottom:14px;}
canvas.chart{width:100%;display:block;}

/* INSIGHTS */
.insight{border-left:2px solid #333;border-radius:3px;padding:9px 12px;font-size:12px;color:var(--t3);line-height:1.5;margin-bottom:5px;background:var(--bg2);}
.insight.good{border-color:var(--green);}
.insight.warn{border-color:var(--red);}
.insight.info{border-color:#555;}
.insight strong{color:var(--t1);}

/* FTP BLOCK */
.ftp-block{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:10px 14px;margin-bottom:20px;}
.ftp-title{font-size:10px;font-weight:600;color:var(--t4);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
.ftp-zones{display:flex;gap:6px;flex-wrap:wrap;}
.ftp-z{background:var(--bg3);border:1px solid var(--border2);border-radius:2px;padding:5px 9px;}
.ftp-zn{font-size:10px;color:var(--t4);}
.ftp-zv{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace;font-weight:500;}

/* PHASE HEADER */
.phase-header{display:flex;align-items:baseline;gap:14px;padding:20px 0 10px;border-top:1px solid #2a2a2a;margin-top:8px;}
.phase-header:first-child{border-top:none;padding-top:0;}
.phase-label{font-size:11px;font-weight:700;color:#c0c0c0;text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap;}
.phase-desc{font-size:11px;color:#555;}

/* CHECKPOINT SEPARATOR */
.checkpoint-sep{display:flex;align-items:center;gap:14px;background:#1a1a1a;border:1px solid #333;border-radius:3px;padding:12px 16px;margin:12px 0;cursor:pointer;transition:border-color 0.15s;}
.checkpoint-sep:hover{border-color:#555;}
.checkpoint-sep.sel{border-color:#666;}
.cp-left{display:flex;align-items:baseline;gap:10px;}
.cp-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;}
.cp-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:#555;}
.cp-arrow{color:#333;font-size:14px;}
.cp-next{font-size:12px;color:#777;}
.ride-detail{background:#161616;border:1px solid #333;border-radius:4px;padding:16px;margin-top:2px;margin-bottom:4px;display:none;}
.ride-detail.open{display:block;}


@media(max-width:680px){
  .dow-hdr{display:none;}
  .days-grid{grid-template-columns:1fr 1fr;}
  .stats{flex-wrap:wrap;}
  .stat{min-width:45%;}
  .act-metrics{display:none;}
}
</style>
</head>

</main>

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

function fmtDur(sec){const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60);return h>0?`${h}h ${m}min`:`${m}min`;}
function fmtDist(m){return(m/1000).toFixed(1)+' km';}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'});}
function actDur(a){return a.power_duration_sec||a.duration_sec;}
function zstrip(zones){if(!zones||!zones.length)return'';return`<div class="zstrip">${zones.map((p,i)=>`<div class="zs" style="width:${p}%;background:${ZC[i]}"></div>`).join('')}</div>`;}

function renderPlan(){
  const el=document.getElementById('page-plan');

    <div class="ftp-title">Trainingszonen · FTP = 240W geschätzt · Rampentest Do 21.05</div>
    <div class="ftp-zones">
      <div class="ftp-z"><div class="ftp-zn">Z1 Erholung</div><div class="ftp-zv">&lt;144W · &lt;119 bpm</div></div>
      <div class="ftp-z"><div class="ftp-zn">Z2 Aerob</div><div class="ftp-zv">144–180W · 119–145 bpm</div></div>
      <div class="ftp-z"><div class="ftp-zn">Z3 Sweetspot</div><div class="ftp-zv">180–216W · 145–154 bpm</div></div>
      <div class="ftp-z"><div class="ftp-zn">Z4 Schwelle</div><div class="ftp-zv">216–252W · 154–166 bpm</div></div>
    </div>
  </div>`;

    // Phase header + optional checkpoint separator (both on same week object)

    }

      const gs=week.checkpoint.goal?'border-color:#555;':'';
      html+=`<div class="checkpoint-sep" style="${gs}">
        <span class="cp-label">${week.checkpoint.label}</span>
        <div class="cp-arrow">→</div>
        <span class="cp-next">${week.checkpoint.det}</span>
      </div>`;
    }
    // Normal week — all weeks start Monday, no offset needed
    html+=`<div class="cal-week">
      <div class="cal-week-hdr">
        <span class="cwl">${week.label}</span><span class="cwd">${week.dates}</span>
        <div class="cwline"></div><span class="cwv">${week.vol}</span>
      </div>
      <div class="dow-hdr">${['Mo','Di','Mi','Do','Fr','Sa','So'].map(d=>`<div class="dow-label">${d}</div>`).join('')}</div>

      const tc=d.type==='rest'?'rest':d.type==='test'?'test':d.type==='check'?'check':'';
      const cls=['day-card',d.past?'past':d.done?'done':d.dimmed?'dimmed':d.today?'today-c':''].filter(Boolean).join(' ');
      html+=`<div class="${cls}" onclick="togglePlanDetail(${wi},${di},this)">

function togglePlanDetail(wi,di,cardEl){
  const panel=document.getElementById(`plan-detail-${wi}`);
  const week=PLAN_WEEKS[wi];
  const d=week.days?.[di];
  if(!d||d.empty||d.dimmed)return;
  const allCards=cardEl.parentElement.querySelectorAll('.day-card');
  const was=cardEl.classList.contains('sel');
  allCards.forEach(c=>c.classList.remove('sel'));
  if(was){panel.classList.remove('open');panel.innerHTML='';return;}
  cardEl.classList.add('sel');
  const[day,mon]=d.date.split('.');
  const act=allActivities.find(a=>a.date===`2026-${mon}-${day}`);
  let html=`<div class="wd-title">${d.title} · ${d.date}</div>`;
  html+=`<div class="insight info"><strong>Geplant:</strong> ${d.det}</div>`;
  if(act)html+=`<div class="insight good"><strong>Gefahren:</strong> ${act.avg_power?`Ø ${act.avg_power}W · NP ${act.np||'—'}W · `:''}${fmtDur(actDur(act))}${act.distance_m?' · '+fmtDist(act.distance_m):''}</div>`;
  else html+=`<div class="insight">Noch nicht gefahren.</div>`;
  panel.innerHTML=html;
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function selectRide(id){
  if(selectedRideId&&selectedRideId!==id){
    const prev=document.getElementById('rd-'+selectedRideId);
    if(prev){prev.classList.remove('open');prev.innerHTML='';}
  }
  selectedRideId=(selectedRideId===id)?null:id;
  if(!selectedRideId){
    const prev=document.getElementById('rd-'+id);
    if(prev){prev.classList.remove('open');prev.innerHTML='';}
    document.querySelectorAll('.act-row.selected').forEach(el=>el.classList.remove('selected'));
    return;
  }
  const act=allActivities.find(a=>a.id===id);
  if(!act)return;
  document.querySelectorAll('.act-row.selected').forEach(el=>el.classList.remove('selected'));
  const clickedRow=document.querySelector(`#rd-${id}`)?.previousElementSibling;
  if(clickedRow)clickedRow.classList.add('selected');
  const panel=document.getElementById('rd-'+id);
  if(!panel)return;
  panel.innerHTML=buildDetail(act);
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  setTimeout(()=>loadAndDrawAnalysis(act),50);
}

// ── DETAIL ──
function buildDetail(act){
  const dur=actDur(act);
  const durMin=dur/60;
  const hasAnalysis=durMin>=30&&(act.has_power||act.power_duration_sec)&&act.has_hr;

  // Derived metrics
  const IF=act.np?+(act.np/FTP).toFixed(2):null;
  const TSS=act.np&&IF?Math.round(dur*act.np*IF/(FTP*3600)*100):null;
  const VI=act.np&&act.avg_power?+(act.np/act.avg_power).toFixed(2):null;

  function zTime(pct){
    const s=Math.round(pct/100*dur);
    const m=Math.floor(s/60),ss=s%60;
    return m>60?`${Math.floor(m/60)}h ${m%60}m`:`${m}:${String(ss).padStart(2,'0')}`;
  }
  function secToStr(s){
    const m=Math.floor(s/60),ss=s%60;
    return m>60?`${Math.floor(m/60)}h ${m%60}m`:`${m}:${String(ss).padStart(2,'0')}`;
  }

  let h=`<div class="wd-title">${act.name} · ${fmtDate(act.date)} · ${act.start_time}</div>`;

  // ── TOP METRICS ROW ──
  h+=`<div class="detail-stats" style="margin-bottom:14px">`;
  if(TSS)  h+=`<div class="ds"><div class="ds-label">TSS</div><div class="ds-val">${TSS}</div><div class="ds-sub">Training Stress</div></div>`;
  if(IF)   h+=`<div class="ds"><div class="ds-label">IF</div><div class="ds-val">${IF}</div><div class="ds-sub">Intensity Factor</div></div>`;
  if(act.np) h+=`<div class="ds"><div class="ds-label">NP</div><div class="ds-val">${act.np}<span> W</span></div><div class="ds-sub">Normalized Power</div></div>`;
  if(VI)   h+=`<div class="ds"><div class="ds-label">VI</div><div class="ds-val">${VI}</div><div class="ds-sub">Variability</div></div>`;
  if(act.kilojoules) h+=`<div class="ds"><div class="ds-label">Arbeit</div><div class="ds-val">${act.kilojoules}<span> kJ</span></div></div>`;
  h+=`<div class="ds"><div class="ds-label">Dauer</div><div class="ds-val">${fmtDur(dur)}</div></div>`;
  if(act.distance_m) h+=`<div class="ds" style="${!act.gps_ok?'border-color:var(--red)':''}"><div class="ds-label">Distanz${!act.gps_ok?' ⚠':''}</div><div class="ds-val">${fmtDist(act.distance_m)}</div></div>`;
  if(act.elevation_m) h+=`<div class="ds"><div class="ds-label">Höhenmeter</div><div class="ds-val">${act.elevation_m}<span> m</span></div></div>`;
  h+=`</div>`;

  // ── POWER ──
  if(act.avg_power){
    h+=`<div class="sh"><div class="sh-title">Power</div><div class="sh-line"></div></div>`;
    h+=`<div class="detail-stats" style="margin-bottom:10px">
      <div class="ds"><div class="ds-label">Ø Power</div><div class="ds-val">${act.avg_power}<span> W</span></div></div>
      ${act.max_power?`<div class="ds"><div class="ds-label">Max Power</div><div class="ds-val">${act.max_power}<span> W</span></div></div>`:''}
      ${act.avg_cadence?`<div class="ds"><div class="ds-label">Ø Kadenz</div><div class="ds-val">${Math.round(act.avg_cadence)}<span> rpm</span></div></div>`:''}
    </div>`;

    // Power chart
    if(act.streams?.watts?.length){
      h+=`<div class="chart-wrap"><canvas class="chart" id="chart-${act.id}" height="70"></canvas></div>`;
    }

    // Power curve
    if(act.power_curve&&Object.keys(act.power_curve).length){
      const durs=[5,10,30,60,120,300,600,1200],lbls=['5s','10s','30s','1m','2m','5m','10m','20m'];
      const cols=['#ef4444','#f97316','#f97316','#fbbf24','#60a5fa','#60a5fa','#666','#444'];
      const vals=durs.map(d=>act.power_curve[String(d)]||0);
      const maxV=Math.max(...vals)||1;
      h+=`<div class="sh" style="margin-top:10px"><div class="sh-title">Power Curve</div><div class="sh-line"></div></div><div class="pcurve">`;
      durs.forEach((d,i)=>{const v=act.power_curve[String(d)];if(!v)return;const pct=+(v/FTP*100).toFixed(0);h+=`<div class="pcb-w"><div class="pcb" style="height:${v/maxV*100}%;background:${cols[i]}"></div><div class="pcb-val">${v}W</div><div class="pcb-lbl">${lbls[i]}</div><div class="pcb-pct">${pct}%</div></div>`;});
      h+=`</div>`;
    }

    // Power zones with time
    if(act.power_zones?.length){
      const pzNames=['Z1 Erholung','Z2 Aerob','Z3 Tempo','Z4 Schwelle','Z5 Max'];
      const pzBounds=['<144W','144–180W','180–216W','216–252W','>252W'];
      h+=`<div class="sh" style="margin-top:10px"><div class="sh-title">Power-Zonen · FTP ${FTP}W</div><div class="sh-line"></div></div><div class="zone-dist">`;
      act.power_zones.forEach((p,i)=>{
        h+=`<div class="zd-row">
          <div class="zd-lbl">${pzNames[i]}</div>
          <div class="zd-bounds">${pzBounds[i]}</div>
          <div class="zd-bg"><div class="zd-bar" style="width:${p}%;background:${ZC[i]}"></div></div>
          <div class="zd-pct">${p}%</div>
          <div class="zd-time">${zTime(p)}</div>
        </div>`;
      });
      h+=`</div>`;
    }
  }

  // ── HERZFREQUENZ ──
  if(act.avg_hr){
    h+=`<div class="sh" style="margin-top:14px"><div class="sh-title">Herzfrequenz</div><div class="sh-line"></div></div>`;
    h+=`<div class="detail-stats" style="margin-bottom:10px">
      <div class="ds"><div class="ds-label">Ø HR</div><div class="ds-val">${act.avg_hr}<span> bpm</span></div></div>
      <div class="ds"><div class="ds-label">Max HR</div><div class="ds-val">${act.max_hr}<span> bpm</span></div></div>
      ${act.kilojoules?`<div class="ds"><div class="ds-label">Kalorien</div><div class="ds-val">${act.kilojoules}<span> kcal</span></div></div>`:''}
    </div>`;

    // HR chart (if no power chart already shown)
    if(!act.avg_power&&act.streams?.hr?.length){
      h+=`<div class="chart-wrap"><canvas class="chart" id="chart-${act.id}" height="70"></canvas></div>`;
    }

    // HR zones with time — Wahoo-style labels
    if(act.hr_zones?.length){
      const hrZNames=['Easy','Fat Burn','Cardio','Hard','Peak'];
      const hrZBounds=[`<${Math.round(HRMAX*0.6)}`,`${Math.round(HRMAX*0.6)}–${Math.round(HRMAX*0.7)}`,`${Math.round(HRMAX*0.7)}–${Math.round(HRMAX*0.77)}`,`${Math.round(HRMAX*0.77)}–${Math.round(HRMAX*0.88)}`,`>${Math.round(HRMAX*0.88)}`];
      h+=`<div class="sh" style="margin-top:10px"><div class="sh-title">HR-Zonen · HRmax ${HRMAX} bpm</div><div class="sh-line"></div></div><div class="zone-dist">`;
      act.hr_zones.forEach((p,i)=>{
        h+=`<div class="zd-row">
          <div class="zd-lbl">${hrZNames[i]}</div>
          <div class="zd-bounds">${hrZBounds[i]}</div>
          <div class="zd-bg"><div class="zd-bar" style="width:${p}%;background:${ZC[i]}"></div></div>
          <div class="zd-pct">${p}%</div>
          <div class="zd-time">${zTime(p)}</div>
        </div>`;
      });
      h+=`</div>`;
    }
  }

  // ── AEROBE ANALYSE ──
  if(hasAnalysis){
    h+=`<div class="sh" style="margin-top:14px"><div class="sh-title">Aerobe Analyse · Kern (ohne Warmup/Cooldown)</div><div class="sh-line"></div></div>`;
    h+=`<div id="aerob-${act.id}"><div class="insight" style="color:#444">Lade Analyse...</div></div>`;
  }

  // ── EINSCHÄTZUNG ──
  h+=`<div class="sh" style="margin-top:14px"><div class="sh-title">Einschätzung</div><div class="sh-line"></div></div>`;
  if(TSS)h+=`<div class="insight"><strong>TSS ${TSS}</strong> — ${TSS<50?'leichte Einheit, schnelle Erholung (<24h)':TSS<100?'moderate Belastung, Erholung ~24–36h':TSS<150?'harte Einheit, 2–3 Tage Erholung':'sehr harte Einheit, >3 Tage Erholung'}.</div>`;
  if(act.np&&act.np>FTP*1.05)h+=`<div class="insight warn"><strong>NP über FTP:</strong> ${act.np}W — intensiver als Z2. Typisch für Hügel oder Intervalle.</div>`;
  if(act.decoupling_pct!==undefined&&act.decoupling_pct<5)h+=`<div class="insight good"><strong>Gute aerobe Effizienz:</strong> Drift ${act.decoupling_pct}% — unter 5% ist sehr gut.</div>`;
  if(act.decoupling_pct!==undefined&&act.decoupling_pct>=5)h+=`<div class="insight warn"><strong>Hoher Drift ${act.decoupling_pct}%:</strong> Aerobe Basis noch im Aufbau — normal für Phase 1.</div>`;
  if(act.avg_power&&act.avg_power<FTP*0.75)h+=`<div class="insight good"><strong>Z2-Einheit:</strong> Ø ${act.avg_power}W — aerobe Grundlage.</div>`;
  if(!act.gps_ok)h+=`<div class="insight warn"><strong>GPS unvollständig:</strong> ${act.gps_coverage_pct}% getrackt.</div>`;
  return h;
}


// ── LOAD ANALYSIS + DRAW ALL CHARTS ──
async function loadAndDrawAnalysis(act){
  const id=act.id;

  // Draw mini loading state
  function loadingCanvas(c,h){
    if(!c)return;
    const dpr=window.devicePixelRatio||1,W=Math.floor(c.parentElement.clientWidth||600);
    c.width=W*dpr;c.height=h*dpr;c.style.width=W+'px';c.style.height=h+'px';
    const ctx=c.getContext('2d');ctx.scale(dpr,dpr);
    ctx.fillStyle='rgba(255,255,255,0.03)';ctx.fillRect(0,0,W,h);
    ctx.fillStyle='#333';ctx.font='10px sans-serif';ctx.textAlign='center';
    ctx.fillText('Lade...',W/2,h/2+4);
  }
  const c0=document.getElementById('chart-'+id);
  if(c0) loadingCanvas(c0,90);

  // Fetch analysis
  let an=null;
  try{
    const r=await fetch('data/analysis/'+id+'.json?_='+Date.now());
    if(r.ok) an=await r.json();
  }catch(e){}

  const chart=an?.chart||act.streams||{};
  const ts=chart.time||[],pw=chart.watts||[],hr=chart.hr||[],alt=chart.altitude||[];

  // ── SETUP CANVAS helper ──
  function SC(c,h){
    if(!c)return null;
    const dpr=window.devicePixelRatio||1,W=Math.floor(c.parentElement.clientWidth-2);
    c.width=W*dpr;c.height=h*dpr;c.style.width=W+'px';c.style.height=h+'px';
    const ctx=c.getContext('2d');ctx.scale(dpr,dpr);
    return{ctx,W,H:h};
  }

  // ── MAIN CHART: Power + HR + Altitude ──
  if(c0&&ts.length){
    const{ctx,W,H}=SC(c0,100);
    const pL=42,pR=44,pT=12,pB=24,cW=W-pL-pR,cH=H-pT-pB;
    const maxT=ts[ts.length-1]||1;
    const maxP=pw.length?Math.min(600,Math.max(350,...pw.filter(v=>v<1500))):400;
    const minHR=70,maxHR=Math.min(185,Math.max(150,...hr.filter(h=>h>60))+5);

    function xOf(t){return pL+(t/maxT)*cW;}
    function yP(p){return pT+cH-(Math.min(p,maxP)/maxP)*cH;}
    function yH(h){return pT+cH-((Math.max(minHR,Math.min(maxHR,h))-minHR)/(maxHR-minHR))*cH;}

    // Altitude fill
    if(alt.length>1){
      const aMin=Math.min(...alt)-5,aMax=Math.max(...alt)+10;
      function yA(a){return pT+cH-(a-aMin)/(aMax-aMin)*cH;}
      ctx.beginPath();
      alt.forEach((a,i)=>{i===0?ctx.moveTo(xOf(ts[i]),yA(a)):ctx.lineTo(xOf(ts[i]),yA(a));});
      ctx.lineTo(xOf(maxT),pT+cH);ctx.lineTo(xOf(0),pT+cH);ctx.closePath();
      ctx.fillStyle='rgba(100,100,100,0.15)';ctx.fill();
    }

    // Grid W
    ctx.strokeStyle='#1e1e1e';ctx.lineWidth=1;
    [100,200,300].forEach(p=>{ctx.beginPath();ctx.moveTo(pL,yP(p));ctx.lineTo(pL+cW,yP(p));ctx.stroke();});
    // Grid time
    const tks=Math.min(8,Math.floor(maxT/300));
    for(let i=0;i<=tks;i++){const t=i*maxT/tks;ctx.beginPath();ctx.moveTo(xOf(t),pT);ctx.lineTo(xOf(t),pT+cH);ctx.stroke();}
    // FTP line
    if(pw.length){
      ctx.strokeStyle='rgba(249,115,22,0.25)';ctx.setLineDash([4,5]);
      ctx.beginPath();ctx.moveTo(pL,yP(FTP));ctx.lineTo(pL+cW,yP(FTP));ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='rgba(249,115,22,0.4)';ctx.font='8px monospace';ctx.textAlign='left';ctx.fillText('FTP '+FTP+'W',pL+2,yP(FTP)-3);
    }
    // Power fill+line
    if(pw.length){
      ctx.beginPath();ts.forEach((t,i)=>{i===0?ctx.moveTo(xOf(t),yP(pw[i]||0)):ctx.lineTo(xOf(t),yP(pw[i]||0));});
      ctx.strokeStyle='rgba(249,115,22,0.75)';ctx.lineWidth=1.5;ctx.stroke();
      ctx.lineTo(xOf(maxT),yP(0));ctx.lineTo(xOf(0),yP(0));ctx.closePath();
      ctx.fillStyle='rgba(249,115,22,0.07)';ctx.fill();
    }
    // HR line
    if(hr.length){
      ctx.beginPath();let fst=true;
      ts.forEach((t,i)=>{if(!hr[i]||hr[i]<50)return;fst?(ctx.moveTo(xOf(t),yH(hr[i])),fst=false):ctx.lineTo(xOf(t),yH(hr[i]));});
      ctx.strokeStyle='rgba(200,200,200,0.8)';ctx.lineWidth=1.5;ctx.stroke();
    }
    // Y labels left (W)
    ctx.fillStyle='rgba(249,115,22,0.6)';ctx.font='9px monospace';ctx.textAlign='right';
    [100,200,300].filter(p=>p<maxP).forEach(p=>ctx.fillText(p+'W',pL-3,yP(p)+3));
    // Y labels right (HR)
    ctx.fillStyle='rgba(200,200,200,0.55)';ctx.textAlign='left';
    [Math.round(minHR+10),Math.round((minHR+maxHR)/2),Math.round(maxHR-5)].forEach(h=>ctx.fillText(h,W-pR+3,yH(h)+3));
    // X labels
    ctx.fillStyle='#3a3a3a';ctx.textAlign='center';
    for(let i=0;i<=tks;i++){const t=i*maxT/tks;ctx.fillText(Math.round(t/60)+"'",xOf(t),H-5);}
    ctx.fillStyle='rgba(249,115,22,0.55)';ctx.font='9px sans-serif';ctx.textAlign='left';ctx.fillText('Watt',pL+4,pT+13);
    ctx.fillStyle='rgba(200,200,200,0.5)';ctx.fillText('HR',pL+28,pT+13);
  }

  if(!an)return;

  // ── FILL AEROBIC SECTION ──
  const aDiv=document.getElementById('aerob-'+id);
  if(aDiv&&an.decoupling){
    const d=an.decoupling;
    const ok=Math.abs(d.drift_pct)<5;
    const driftColor=d.drift_pct>0?'var(--red)':'var(--green)'; // positive=bad, negative=improved

    aDiv.innerHTML=`
    <canvas id="an-dual-${id}" style="display:block;width:100%;box-sizing:border-box;margin-bottom:4px"></canvas>
    <div style="display:flex;gap:6px;margin-bottom:4px">
      <canvas id="an-ef-${id}" style="display:block;flex:1;box-sizing:border-box"></canvas>
      <canvas id="an-sc-${id}" style="display:block;box-sizing:border-box"></canvas>
    </div>
    <div class="detail-stats" style="margin-top:8px">
      <div class="ds"><div class="ds-label">EF gesamt</div><div class="ds-val">${d.ef_gesamt.toFixed(3)}<span> W/bpm</span></div><div class="ds-sub">NP_core / Ø HR_core</div></div>
      <div class="ds"><div class="ds-label">EF₁ (1. Hälfte)</div><div class="ds-val">${d.ef1.toFixed(3)}<span> W/bpm</span></div><div class="ds-sub">${d.avg_w1.toFixed(0)}W · ${d.avg_h1.toFixed(0)} bpm</div></div>
      <div class="ds"><div class="ds-label">EF₂ (2. Hälfte)</div><div class="ds-val">${d.ef2.toFixed(3)}<span> W/bpm</span></div><div class="ds-sub">${d.avg_w2.toFixed(0)}W · ${d.avg_h2.toFixed(0)} bpm</div></div>
      <div class="ds"><div class="ds-label">Drift</div><div class="ds-val" style="color:${driftColor}">${d.drift_pct>0?'+':''}${d.drift_pct}<span>%</span></div><div class="ds-sub">${d.drift_pct>0?'HR stieg (Drift)':d.drift_pct<0?'EF stieg (Bergprofil?)':'kein Drift'}</div></div>
      <div class="ds"><div class="ds-label">n Kern-Punkte</div><div class="ds-val">${d.n_core}</div><div class="ds-sub">nach Trim</div></div>
    </div>`;

    // Draw dual chart
    setTimeout(()=>{
      drawDualChart(id, an);
      drawEFChart(id, an);
      drawScatter(id, an);
    },20);
  } else if(aDiv&&!an.decoupling){
    aDiv.innerHTML=`<div class="insight">Zu kurz oder kein HR+Power — keine Aerobanalyse.</div>`;
  }
}

function drawDualChart(id, an){
  const c=document.getElementById('an-dual-'+id);
  if(!c)return;
  const ch=an.chart||{};
  const ts=ch.time||[],pw=ch.watts||[],hr=ch.hr||[];
  if(!ts.length)return;
  const{ctx,W,H}=SC2(c,155);
  const d=an.decoupling;
  const pL=42,pR=44,pT=20,pB=24,cW=W-pL-pR,cH=H-pT-pB;
  const maxT=ts[ts.length-1]||1;
  const minWv=0,maxWv=Math.min(600,Math.max(300,...pw.filter(v=>v<1500)));
  const hrVals=hr.filter(h=>h>60);
  const minHv=Math.max(60,Math.min(...hrVals)-5);
  const maxHv=Math.min(185,Math.max(...hrVals)+5);

  function xOf(t){return pL+(t/maxT)*cW;}
  function yW(w){return pT+cH-(Math.min(w,maxWv)/maxWv)*cH;}
  function yH(h){return pT+cH-((Math.max(minHv,Math.min(maxHv,h))-minHv)/(maxHv-minHv))*cH;}

  // Grid
  ctx.strokeStyle='#1e1e1e';ctx.lineWidth=1;
  const tks=Math.min(8,Math.floor(maxT/300));
  for(let i=0;i<=tks;i++){const t=i*maxT/tks;ctx.beginPath();ctx.moveTo(xOf(t),pT);ctx.lineTo(xOf(t),pT+cH);ctx.stroke();}
  [100,200,300].forEach(p=>{ctx.beginPath();ctx.moveTo(pL,yW(p));ctx.lineTo(pL+cW,yW(p));ctx.stroke();});

  // Half line + annotations
  if(d){
    const ht=d.half_t;
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.setLineDash([4,5]);
    ctx.beginPath();ctx.moveTo(xOf(ht),pT);ctx.lineTo(xOf(ht),pT+cH);ctx.stroke();ctx.setLineDash([]);
    ctx.font='9px monospace';ctx.textAlign='center';
    ctx.fillStyle='rgba(255,255,255,0.25)';
    ctx.fillText('EF₁ '+d.ef1.toFixed(3),xOf(ht*0.4),pT+11);
    ctx.fillText('EF₂ '+d.ef2.toFixed(3),xOf(Math.min(ht*1.6,maxT*0.85)),pT+11);
    ctx.fillStyle=d.drift_pct>0?'#a08050':'#5a8a52';
    ctx.fillText((d.drift_pct>0?'+':'')+d.drift_pct+'%',xOf(ht),pT+11);
  }

  // Power
  ctx.beginPath();ts.forEach((t,i)=>{i===0?ctx.moveTo(xOf(t),yW(pw[i]||0)):ctx.lineTo(xOf(t),yW(pw[i]||0));});
  ctx.strokeStyle='rgba(249,115,22,0.7)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.lineTo(xOf(maxT),yW(0));ctx.lineTo(xOf(0),yW(0));ctx.closePath();ctx.fillStyle='rgba(249,115,22,0.06)';ctx.fill();

  // HR
  ctx.beginPath();let fst=true;
  ts.forEach((t,i)=>{if(!hr[i]||hr[i]<50)return;fst?(ctx.moveTo(xOf(t),yH(hr[i])),fst=false):ctx.lineTo(xOf(t),yH(hr[i]));});
  ctx.strokeStyle='rgba(200,200,200,0.75)';ctx.lineWidth=1.5;ctx.stroke();

  // Labels
  ctx.fillStyle='rgba(249,115,22,0.6)';ctx.font='9px monospace';ctx.textAlign='right';
  [100,200,300].filter(p=>p<maxWv).forEach(p=>ctx.fillText(p+'W',pL-3,yW(p)+3));
  ctx.fillStyle='rgba(200,200,200,0.55)';ctx.textAlign='left';
  [Math.round(minHv+5),Math.round((minHv+maxHv)/2),Math.round(maxHv-5)].forEach(h=>ctx.fillText(h,W-pR+3,yH(h)+3));
  ctx.fillStyle='#3a3a3a';ctx.textAlign='center';
  for(let i=0;i<=tks;i++){const t=i*maxT/tks;ctx.fillText(Math.round(t/60)+"'",xOf(t),H-5);}
  ctx.fillStyle='rgba(249,115,22,0.55)';ctx.font='9px sans-serif';ctx.textAlign='left';ctx.fillText('Watt',pL+4,pT+10);
  ctx.fillStyle='rgba(200,200,200,0.5)';ctx.fillText('HR',pL+28,pT+10);
}

function drawEFChart(id, an){
  const c=document.getElementById('an-ef-'+id);
  if(!c)return;
  const ef=an.ef_series||[];
  if(!ef.length)return;

  // Filter outliers: keep ef in [0.6, 2.5]
  const efClean=ef.filter(p=>p.ef>=0.6&&p.ef<=2.5);
  if(!efClean.length)return;

  // Set height = 60% of width for reasonable aspect
  const W0=Math.floor(c.parentElement.clientWidth);
  const H=Math.round(W0*0.45);

  const{ctx,W}=SC2(c,H);
  const pL=40,pR=10,pT=10,pB=24,cW=W-pL-pR,cH=H-pT-pB;
  const maxT=efClean[efClean.length-1].t;
  const efVals=efClean.map(p=>p.ef);
  const minEF=Math.max(0.6,Math.min(...efVals)-0.05);
  const maxEF=Math.min(2.5,Math.max(...efVals)+0.05);
  const avgEF=efVals.reduce((s,v)=>s+v,0)/efVals.length;

  function xOf(t){return pL+(t/maxT)*cW;}
  function yEF(e){return pT+cH-(e-minEF)/(maxEF-minEF)*cH;}

  ctx.strokeStyle='#1e1e1e';ctx.lineWidth=1;
  const tks=Math.min(6,Math.floor(maxT/300));
  for(let i=0;i<=tks;i++){const t=i*maxT/tks;ctx.beginPath();ctx.moveTo(xOf(t),pT);ctx.lineTo(xOf(t),pT+cH);ctx.stroke();}

  // Avg ref line
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.setLineDash([4,6]);
  ctx.beginPath();ctx.moveTo(pL,yEF(avgEF));ctx.lineTo(pL+cW,yEF(avgEF));ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='9px monospace';ctx.textAlign='left';
  ctx.fillText('Ø '+avgEF.toFixed(3),pL+4,yEF(avgEF)-3);

  // EF line
  ctx.beginPath();efClean.forEach((p,i)=>{i===0?ctx.moveTo(xOf(p.t),yEF(p.ef)):ctx.lineTo(xOf(p.t),yEF(p.ef));});
  ctx.strokeStyle='rgba(96,165,250,0.8)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.lineTo(xOf(maxT),yEF(minEF));ctx.lineTo(xOf(efClean[0].t),yEF(minEF));ctx.closePath();
  ctx.fillStyle='rgba(96,165,250,0.06)';ctx.fill();

  // Labels
  [minEF,avgEF,maxEF].forEach(e=>{ctx.fillStyle='rgba(96,165,250,0.5)';ctx.font='9px monospace';ctx.textAlign='right';ctx.fillText(e.toFixed(2),pL-3,yEF(e)+3);});
  ctx.fillStyle='#3a3a3a';ctx.textAlign='center';
  for(let i=0;i<=tks;i++){const t=i*maxT/tks;ctx.fillText(Math.round(t/60)+"'",xOf(t),H-5);}
  ctx.fillStyle='rgba(96,165,250,0.6)';ctx.font='9px sans-serif';ctx.textAlign='left';ctx.fillText('Rolling EF (120s)',pL+3,pT+12);
}

function drawScatter(id, an){
  const c=document.getElementById('an-sc-'+id);
  if(!c)return;
  const sc=an.scatter||[];
  if(!sc.length)return;

  // Square canvas: height = width of this element
  const W0=Math.floor(c.offsetWidth||c.parentElement.clientWidth/2);
  const H=W0; // square!
  c.style.height=H+'px';

  const{ctx,W}=SC2(c,H);
  const pL=36,pR=10,pT=10,pB=30,cW=W-pL-pR,cH=H-pT-pB;

  const wVals=sc.map(p=>p.w).sort((a,b)=>a-b);
  const hVals=sc.map(p=>p.hr).sort((a,b)=>a-b);
  const p5w=wVals[Math.floor(wVals.length*0.03)];
  const p95w=wVals[Math.floor(wVals.length*0.97)];
  const p5h=hVals[Math.floor(hVals.length*0.02)];
  const p95h=hVals[Math.floor(hVals.length*0.98)];
  const minW=Math.max(0,p5w-10),maxW=p95w+10;
  const minH=Math.max(60,p5h-3),maxH=Math.min(185,p95h+3);

  function xOf(w){return pL+((w-minW)/(maxW-minW))*cW;}
  function yOf(h){return pT+cH-((h-minH)/(maxH-minH))*cH;}

  // Grid
  ctx.strokeStyle='#1e1e1e';ctx.lineWidth=1;
  const wStep=Math.ceil((maxW-minW)/5/10)*10||20;
  for(let w=Math.ceil(minW/wStep)*wStep;w<=maxW;w+=wStep){ctx.beginPath();ctx.moveTo(xOf(w),pT);ctx.lineTo(xOf(w),pT+cH);ctx.stroke();}
  const hStep=5;
  for(let h=Math.ceil(minH/hStep)*hStep;h<=maxH;h+=hStep){ctx.beginPath();ctx.moveTo(pL,yOf(h));ctx.lineTo(pL+cW,yOf(h));ctx.stroke();}

  // Points colored by time
  const tMin=sc[0].t,tMax=sc[sc.length-1].t;
  sc.forEach(p=>{
    if(p.w<minW||p.w>maxW||p.hr<minH||p.hr>maxH)return;
    const tf=(p.t-tMin)/(tMax-tMin);
    const r=Math.round(96+tf*(249-96)),g=Math.round(165+tf*(115-165)),b=Math.round(250+tf*(22-250));
    ctx.beginPath();ctx.arc(xOf(p.w),yOf(p.hr),2.5,0,Math.PI*2);
    ctx.fillStyle='rgba('+r+','+g+','+b+',0.72)';ctx.fill();
  });

  // Axis labels
  ctx.fillStyle='rgba(180,180,180,0.5)';ctx.font='9px monospace';ctx.textAlign='right';
  for(let h=Math.ceil(minH/hStep)*hStep;h<=maxH;h+=hStep*2)ctx.fillText(h,pL-3,yOf(h)+3);
  ctx.fillStyle='#3a3a3a';ctx.textAlign='center';
  for(let w=Math.ceil(minW/wStep)*wStep;w<=maxW;w+=wStep)ctx.fillText(w+'W',xOf(w),H-5);
  ctx.fillStyle='rgba(180,180,180,0.4)';ctx.font='9px sans-serif';ctx.textAlign='left';ctx.fillText('HR vs Watt',pL+3,pT+11);
  ctx.fillStyle='rgba(96,165,250,0.35)';ctx.fillText(' blau→orange = Zeit',pL+56,pT+11);

  // Axis titles
  ctx.fillStyle='rgba(180,180,180,0.4)';ctx.save();ctx.translate(11,pT+cH/2);ctx.rotate(-Math.PI/2);ctx.textAlign='center';ctx.font='9px sans-serif';ctx.fillText('HR (bpm)',0,0);ctx.restore();
}

function SC2(c,h){
  const dpr=window.devicePixelRatio||1,W=Math.floor(c.offsetWidth||c.parentElement.clientWidth);
  c.width=W*dpr;c.height=h*dpr;c.style.width=W+'px';c.style.height=h+'px';
  const ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  return{ctx,W,H:h};
}

// ── CHART ──
function drawChart(act){
  const canvas=document.getElementById(`chart-${act.id}`);
  if(!canvas||!act.streams)return;
  const ts=act.streams.time||[],pw=act.streams.watts||[],hr=act.streams.hr||[];
  if(!ts.length)return;
  const dpr=window.devicePixelRatio||1,W=canvas.parentElement.offsetWidth,H=90;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const pL=36,pR=8,pT=10,pB=22,cW=W-pL-pR,cH=H-pT-pB;
  const maxT=ts[ts.length-1]||1,maxP=pw.length?Math.max(600,...pw):600,minH=80,maxH=175;
  function xOf(t){return pL+(t/maxT)*cW;}
  function yP(p){return pT+cH-(p/maxP)*cH;}
  function yH(h){return pT+cH-((h-minH)/(maxH-minH))*cH;}
  ctx.strokeStyle='#333';ctx.lineWidth=1;
  [100,200,300,400,500].forEach(p=>{if(!pw.length)return;ctx.beginPath();ctx.moveTo(pL,yP(p));ctx.lineTo(pL+cW,yP(p));ctx.stroke();ctx.fillStyle='#555';ctx.font='8px monospace';ctx.textAlign='right';ctx.fillText(p,pL-3,yP(p)+3);});
  if(pw.length){
    ctx.strokeStyle='rgba(180,180,180,0.25)';ctx.lineWidth=1;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.moveTo(pL,yP(FTP));ctx.lineTo(pL+cW,yP(FTP));ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='rgba(180,180,180,0.4)';ctx.font='8px monospace';ctx.textAlign='left';ctx.fillText('FTP',pL+2,yP(FTP)-2);
    ctx.fillStyle='rgba(176,176,176,0.1)';ctx.strokeStyle='rgba(176,176,176,0.7)';ctx.lineWidth=1.5;ctx.beginPath();
    ts.forEach((t,i)=>{const x=xOf(t),y=yP(pw[i]||0);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.stroke();ctx.lineTo(xOf(maxT),yP(0));ctx.lineTo(xOf(0),yP(0));ctx.closePath();ctx.fill();
  }
  if(hr.length){
    ctx.strokeStyle='rgba(136,136,136,0.6)';ctx.lineWidth=1.5;ctx.beginPath();
    ts.forEach((t,i)=>{if(!hr[i]||hr[i]<50)return;const x=xOf(t),y=yH(hr[i]);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.stroke();
  }
  ctx.fillStyle='#555';ctx.font='8px monospace';ctx.textAlign='center';
  const ticks=Math.min(6,Math.floor(maxT/60));
  for(let i=0;i<=ticks;i++){const t=Math.round(i*maxT/ticks);ctx.fillText(Math.round(t/60)+"'",xOf(t),H-5);}
}



// ── LOAD ──
async function loadData(){
  try{
    const r=await fetch('data/activities.json?_='+Date.now());
    const data=await r.json();
    document.getElementById('loading').style.display='none';
    allActivities=data.activities||[];
    const upd=new Date(data.updated_at);
    document.getElementById('updated-at').textContent='Stand: '+upd.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    renderSummary();
    renderActivityList();
  }catch(e){
    document.getElementById('loading').textContent='Keine Daten — GitHub Action noch nicht gelaufen.';
  }
}

renderPlan();
loadData();
setInterval(loadData,5*60*1000);
