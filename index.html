<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Dashboard · Wolf</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --bg:#181818; --bg2:#1e1e1e; --bg3:#111;
  --border:#282828; --border2:#222;
  --t1:#f0f0f0; --t2:#b0b0b0; --t3:#888; --t4:#777; --t5:#666;
  --active:#e0e0e0;
  --green:#5a8a52; --red:#a08080;
  --z1:#34d399; --z2:#60a5fa; --z3:#fbbf24; --z4:#f97316; --z5:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#141414;color:var(--t1);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}

/* NAV */
nav{background:var(--bg3);height:52px;display:flex;align-items:center;padding:0 20px;gap:32px;border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:100;}
.nav-brand{font-size:13px;font-weight:600;color:var(--t1);}
.nav-tabs{display:flex;margin-left:auto;}
.tab{font-size:11px;font-weight:500;color:var(--t5);padding:0 16px;height:52px;display:flex;align-items:center;letter-spacing:0.8px;text-transform:uppercase;border-bottom:2px solid transparent;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif;transition:color 0.15s;}
.tab:hover:not(.active){color:var(--t3);}
.tab.active{color:var(--active);border-bottom-color:var(--active);}
.nav-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t4);}

/* LAYOUT */
main{padding:20px;max-width:1000px;margin:0 auto;}
.page{display:none;}.page.active{display:block;}
#loading{text-align:center;padding:60px 20px;color:var(--t4);font-family:'JetBrains Mono',monospace;font-size:12px;}

/* STATS */
.stats{display:flex;gap:6px;margin-bottom:24px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:14px 18px;flex:1;}
.stat-label{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px;}
.stat-val{font-size:23px;font-weight:700;color:var(--t1);line-height:1;}
.stat-val span{font-size:13px;font-weight:400;color:var(--t5);margin-left:2px;}
.stat-sub{font-size:11px;color:var(--t5);margin-top:4px;}

/* SECTION HEADER */
.sh{display:flex;align-items:baseline;gap:12px;margin-bottom:10px;margin-top:20px;}
.sh-title{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap;}
.sh-meta{font-size:12px;color:var(--t4);}
.sh-line{flex:1;height:1px;background:#252525;}

/* ACTIVITY LIST */
.act-list{display:flex;flex-direction:column;gap:2px;margin-bottom:24px;}
.act-row{background:var(--bg2);border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:border-color 0.15s;}
.act-row:hover{border-color:#444;}
.act-row.selected{border-color:#666;}
.act-main{padding:12px 16px;display:flex;align-items:center;gap:16px;}
.act-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t4);width:104px;flex-shrink:0;}
.act-name{font-size:13px;font-weight:500;color:var(--t1);flex:1;}
.act-metrics{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.am{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--t2);white-space:nowrap;}
.am .u{color:var(--t5);font-size:11px;}
.asep{color:#333;font-size:12px;}
.act-badge{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;color:var(--t5);background:#252525;border:1px solid #2e2e2e;padding:2px 7px;border-radius:2px;white-space:nowrap;}
.zstrip{height:2px;display:flex;gap:1px;border-radius:0 0 2px 2px;overflow:hidden;}
.zs{border-radius:1px;}

/* CALENDAR */
.cal-week{margin-bottom:16px;}
.cal-week-hdr{display:flex;align-items:baseline;gap:12px;margin-bottom:8px;}
.cwl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;}
.cwd{font-size:12px;color:var(--t4);}
.cwv{font-size:12px;color:var(--t4);margin-left:auto;}
.cwline{flex:1;height:1px;background:#252525;}
.dow-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
.dow-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--t4);text-align:center;padding:2px 0;}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.day-card{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:10px;min-height:96px;cursor:pointer;transition:border-color 0.15s;position:relative;}
.day-card:hover{border-color:#444;}
.day-card.done{background:#1a1e1a;border-color:#263026;}
.day-card.dimmed{opacity:0.25;cursor:default;}
.day-card.past{opacity:0.15;cursor:default;}
.day-card.today-c{border-color:var(--t3);}
.day-card.sel{border-color:#666;border-width:2px;}
.dc-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t4);margin-bottom:6px;}
.dc-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--t3);margin-bottom:5px;}
.dc-type.rest{color:var(--t5);font-weight:500;}
.dc-type.test{color:var(--red);}
.dc-type.check{color:var(--t3);}
.dc-title{font-size:12px;font-weight:500;color:var(--t2);line-height:1.35;}
.dc-detail{font-size:11px;color:var(--t3);margin-top:4px;line-height:1.35;}
.dc-done{font-size:10px;font-weight:600;color:var(--green);margin-top:5px;}

/* WEEK DETAIL */
.week-detail{background:#161616;border:1px solid #333;border-radius:4px;padding:16px;margin-top:6px;display:none;}
.week-detail.open{display:block;}
.wd-title{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:12px;}

/* DETAIL STATS */
.detail-stats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.ds{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:10px 14px;flex:1;min-width:80px;}
.ds-label{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;}
.ds-val{font-size:18px;font-weight:700;color:var(--t1);}
.ds-val span{font-size:12px;font-weight:400;color:var(--t4);}
.ds-sub{font-size:11px;color:var(--t5);margin-top:3px;}

/* POWER CURVE */
.pcurve{display:flex;align-items:flex-end;gap:4px;height:70px;margin:8px 0 12px;}
.pcb-w{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.pcb{width:100%;border-radius:2px 2px 0 0;opacity:0.85;}
.pcb-val{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t1);text-align:center;}
.pcb-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t4);text-align:center;}

/* ZONE BARS */
.zone-dist{display:flex;flex-direction:column;gap:5px;margin:8px 0 12px;}
.zd-row{display:flex;align-items:center;gap:8px;}
.zd-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);width:65px;text-align:right;flex-shrink:0;}
.zd-bg{flex:1;background:#252525;border-radius:2px;height:6px;}
.zd-bar{height:6px;border-radius:2px;}
.zd-pct{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t4);width:34px;}

/* CHART */
.chart-wrap{position:relative;margin-bottom:14px;}
canvas.chart{width:100%;display:block;}

/* INSIGHTS */
.insight{border-left:2px solid #333;border-radius:3px;padding:9px 12px;font-size:12px;color:var(--t3);line-height:1.5;margin-bottom:5px;background:var(--bg2);}
.insight.good{border-color:var(--green);}
.insight.warn{border-color:var(--red);}
.insight.info{border-color:#555;}
.insight strong{color:var(--t1);}

/* FTP BLOCK */
.ftp-block{background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:10px 14px;margin-bottom:20px;}
.ftp-title{font-size:10px;font-weight:600;color:var(--t4);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
.ftp-zones{display:flex;gap:6px;flex-wrap:wrap;}
.ftp-z{background:var(--bg3);border:1px solid var(--border2);border-radius:2px;padding:5px 9px;}
.ftp-zn{font-size:10px;color:var(--t4);}
.ftp-zv{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace;font-weight:500;}

/* PHASE HEADER */
.phase-header{display:flex;align-items:baseline;gap:14px;padding:20px 0 10px;border-top:1px solid #2a2a2a;margin-top:8px;}
.phase-header:first-child{border-top:none;padding-top:0;}
.phase-label{font-size:11px;font-weight:700;color:#c0c0c0;text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap;}
.phase-desc{font-size:11px;color:#555;}

/* CHECKPOINT SEPARATOR */
.checkpoint-sep{display:flex;align-items:center;gap:14px;background:#1a1a1a;border:1px solid #333;border-radius:3px;padding:12px 16px;margin:12px 0;cursor:pointer;transition:border-color 0.15s;}
.checkpoint-sep:hover{border-color:#555;}
.checkpoint-sep.sel{border-color:#666;}
.cp-left{display:flex;align-items:baseline;gap:10px;}
.cp-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;}
.cp-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:#555;}
.cp-arrow{color:#333;font-size:14px;}
.cp-next{font-size:12px;color:#777;}
.ride-detail{background:#161616;border:1px solid #333;border-radius:4px;padding:16px;margin-top:2px;margin-bottom:4px;display:none;}
.ride-detail.open{display:block;}


@media(max-width:680px){
  .dow-hdr{display:none;}
  .days-grid{grid-template-columns:1fr 1fr;}
  .stats{flex-wrap:wrap;}
  .stat{min-width:45%;}
  .act-metrics{display:none;}
}
</style>
</head>

</main>

function fmtDur(sec){const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60);return h>0?`${h}h ${m}min`:`${m}min`;}
function fmtDist(m){return(m/1000).toFixed(1)+' km';}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'});}
function actDur(a){return a.power_duration_sec||a.duration_sec;}
function zstrip(zones){if(!zones||!zones.length)return'';return`<div class="zstrip">${zones.map((p,i)=>`<div class="zs" style="width:${p}%;background:${ZC[i]}"></div>`).join('')}</div>`;}

function togglePlanDetail(wi,di,cardEl){
  const panel=document.getElementById(`plan-detail-${wi}`);
  const week=PLAN_WEEKS[wi];
  const d=week.days?.[di];
  if(!d||d.empty||d.dimmed)return;
  const allCards=cardEl.parentElement.querySelectorAll('.day-card');
  const was=cardEl.classList.contains('sel');
  allCards.forEach(c=>c.classList.remove('sel'));
  if(was){panel.classList.remove('open');panel.innerHTML='';return;}
  cardEl.classList.add('sel');
  const[day,mon]=d.date.split('.');
  const act=allActivities.find(a=>a.date===`2026-${mon}-${day}`);
  let html=`<div class="wd-title">${d.title} · ${d.date}</div>`;
  html+=`<div class="insight info"><strong>Geplant:</strong> ${d.det}</div>`;
  if(act)html+=`<div class="insight good"><strong>Gefahren:</strong> ${act.avg_power?`Ø ${act.avg_power}W · NP ${act.np||'—'}W · `:''}${fmtDur(actDur(act))}${act.distance_m?' · '+fmtDist(act.distance_m):''}</div>`;
  else html+=`<div class="insight">Noch nicht gefahren.</div>`;
  panel.innerHTML=html;
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function selectRide(id){
  if(selectedRideId&&selectedRideId!==id){
    const prev=document.getElementById('rd-'+selectedRideId);
    if(prev){prev.classList.remove('open');prev.innerHTML='';}
  }
  selectedRideId=(selectedRideId===id)?null:id;
  if(!selectedRideId){
    const prev=document.getElementById('rd-'+id);
    if(prev){prev.classList.remove('open');prev.innerHTML='';}
    document.querySelectorAll('.act-row.selected').forEach(el=>el.classList.remove('selected'));
    return;
  }
  const act=allActivities.find(a=>a.id===id);
  if(!act)return;
  document.querySelectorAll('.act-row.selected').forEach(el=>el.classList.remove('selected'));
  const clickedRow=document.querySelector(`#rd-${id}`)?.previousElementSibling;
  if(clickedRow)clickedRow.classList.add('selected');
  const panel=document.getElementById('rd-'+id);
  if(!panel)return;
  panel.innerHTML=buildDetail(act);
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  setTimeout(()=>{drawChart(act);drawAnalysis(act);},50);
}

// ── DETAIL ──
function buildDetail(act){
  const durMin=actDur(act)/60;
  const hasAnalysis=durMin>=30&&act.streams?.watts?.length&&act.streams?.hr?.length;
  const hasStreams=act.streams&&(act.streams.watts?.length||act.streams.hr?.length);
  let h=`<div class="wd-title">${act.name} · ${fmtDate(act.date)}</div>`;
  h+=`<div class="detail-stats">
    ${act.avg_power?`<div class="ds"><div class="ds-label">Ø Power</div><div class="ds-val">${act.avg_power}<span> W</span></div>${act.np?`<div class="ds-sub">NP: ${act.np}W</div>`:''}</div>`:''}
    ${act.avg_hr?`<div class="ds"><div class="ds-label">Ø HR</div><div class="ds-val">${act.avg_hr}<span> bpm</span></div><div class="ds-sub">Max: ${act.max_hr}</div></div>`:''}
    <div class="ds" style="${!act.gps_ok?'border-color:var(--red)':''}">
      <div class="ds-label">Distanz${!act.gps_ok?' ⚠️':''}</div>
      <div class="ds-val">${act.distance_m?fmtDist(act.distance_m):'—'}</div>
      <div class="ds-sub">${fmtDur(actDur(act))}${act.kilojoules?' · '+act.kilojoules+'kJ':''}</div>
    </div>
    ${act.elevation_m?`<div class="ds"><div class="ds-label">Höhenmeter</div><div class="ds-val">${act.elevation_m}<span> m</span></div></div>`:''}
    ${act.decoupling_pct!==undefined?`<div class="ds"><div class="ds-label">HR/W Drift</div><div class="ds-val" style="color:${act.decoupling_pct<5?'var(--green)':'var(--red)'}">${act.decoupling_pct}<span>%</span></div><div class="ds-sub">${act.decoupling_pct<5?'gut ✓':'hoch'}</div></div>`:''}
  </div>`;
  if(act.power_curve&&Object.keys(act.power_curve).length){
    const dur=[5,10,30,60,120,300,600,1200],lbl=['5s','10s','30s','1m','2m','5m','10m','20m'];
    const cols=['#ef4444','#f97316','#f97316','#fbbf24','#60a5fa','#60a5fa','#777','#555'];
    const vals=dur.map(d=>act.power_curve[String(d)]||null).filter(Boolean);
    const maxV=Math.max(...vals);
    h+=`<div class="sh" style="margin-top:12px"><div class="sh-title">Power Curve</div><div class="sh-line"></div></div><div class="pcurve">`;
    dur.forEach((d,i)=>{const v=act.power_curve[String(d)];if(!v)return;h+=`<div class="pcb-w"><div class="pcb" style="height:${v/maxV*100}%;background:${cols[i]}"></div><div class="pcb-val">${v}W</div><div class="pcb-lbl">${lbl[i]}</div></div>`;});
    h+=`</div>`;
  }
  const zones=act.power_zones?.length?act.power_zones:act.hr_zones?.length?act.hr_zones:null;
  const zLabel=act.power_zones?.length?`Power-Zonen (FTP ${FTP}W)`:`HR-Zonen (HRmax ${HRMAX})`;
  if(zones){
    h+=`<div class="sh" style="margin-top:4px"><div class="sh-title">${zLabel}</div><div class="sh-line"></div></div><div class="zone-dist">`;
    zones.forEach((p,i)=>{h+=`<div class="zd-row"><div class="zd-lbl">${ZN[i]}</div><div class="zd-bg"><div class="zd-bar" style="width:${p}%;background:${ZC[i]}"></div></div><div class="zd-pct">${p}%</div></div>`;});
    h+=`</div>`;
  }
  if(hasStreams&&!hasAnalysis)h+=`<div class="sh" style="margin-top:4px"><div class="sh-title">Verlauf</div><div class="sh-line"></div></div><div class="chart-wrap"><canvas class="chart" id="chart-${act.id}" height="80"></canvas></div>`;
  if(hasAnalysis){
    // Compute trimmed stats: skip first 3 min warmup + last 5 min cooldown
    const ts2=act.streams.time||[],pw2=act.streams.watts||[],hr2=act.streams.hr||[];
    const totalMin=ts2[ts2.length-1]/60;
    const trimStart=3, trimEnd=Math.max(totalMin-5,totalMin*0.75);
    const trimmed=[];
    for(let i=0;i<ts2.length;i++){
      const t=ts2[i]/60;
      if(t>=trimStart&&t<=trimEnd&&pw2[i]>30&&hr2[i]>60) trimmed.push({t,w:pw2[i],hr:hr2[i]});
    }
    const half=Math.floor(trimmed.length/2);
    const t1=trimmed.slice(0,half), t2=trimmed.slice(half);
    const avgW1=t1.length?t1.reduce((s,p)=>s+p.w,0)/t1.length:0;
    const avgH1=t1.length?t1.reduce((s,p)=>s+p.hr,0)/t1.length:0;
    const avgW2=t2.length?t2.reduce((s,p)=>s+p.w,0)/t2.length:0;
    const avgH2=t2.length?t2.reduce((s,p)=>s+p.hr,0)/t2.length:0;
    const ef1v=avgH1?avgW1/avgH1:0;
    const ef2v=avgH2?avgW2/avgH2:0;
    const drift=ef1v?((ef2v-ef1v)/ef1v*100):0;
    const driftOk=Math.abs(drift)<5;
    const efAvg=trimmed.length?(trimmed.reduce((s,p)=>s+p.w,0)/trimmed.length)/(trimmed.reduce((s,p)=>s+p.hr,0)/trimmed.length):0;

    h+=`<div class="sh" style="margin-top:12px"><div class="sh-title">Aerobe Analyse · Kern (ohne Warmup/Cooldown)</div><div class="sh-line"></div></div>`;
    h+=`<div class="detail-stats" style="margin-bottom:10px">
      <div class="ds"><div class="ds-label">EF gesamt</div><div class="ds-val">${efAvg.toFixed(2)}<span> W/bpm</span></div><div class="ds-sub">norm. Power / Ø HR</div></div>
      <div class="ds"><div class="ds-label">EF₁ (1. Hälfte)</div><div class="ds-val">${ef1v.toFixed(2)}<span> W/bpm</span></div><div class="ds-sub">${Math.round(avgW1)}W · ${Math.round(avgH1)} bpm</div></div>
      <div class="ds"><div class="ds-label">EF₂ (2. Hälfte)</div><div class="ds-val">${ef2v.toFixed(2)}<span> W/bpm</span></div><div class="ds-sub">${Math.round(avgW2)}W · ${Math.round(avgH2)} bpm</div></div>
      <div class="ds"><div class="ds-label">HR/W Drift</div><div class="ds-val" style="color:${driftOk?'var(--green)':'var(--red)'}">${drift.toFixed(1)}<span>%</span></div><div class="ds-sub">${driftOk?'gut ✓ (<5%)':'hoch (>5%)'}</div></div>
    </div>`;
    h+=`<canvas id="an-dual-${act.id}" style="display:block;width:100%;box-sizing:border-box;margin-bottom:6px"></canvas>`;
    h+=`<canvas id="an-ef-${act.id}" style="display:block;width:100%;box-sizing:border-box;margin-bottom:6px"></canvas>`;
    h+=`<canvas id="an-sc-${act.id}" style="display:block;width:100%;box-sizing:border-box"></canvas>`;
  }
  h+=`<div class="sh" style="margin-top:12px"><div class="sh-title">Einschätzung</div><div class="sh-line"></div></div>`;
  if(act.np&&act.np>FTP*1.05)h+=`<div class="insight warn"><strong>NP über FTP:</strong> ${act.np}W — intensiver als Z2. Typisch für hügelige Strecken.</div>`;
  if(act.decoupling_pct!==undefined&&act.decoupling_pct<5)h+=`<div class="insight good"><strong>Gute aerobe Effizienz:</strong> HR/Watt-Drift ${act.decoupling_pct}% — unter 5% ist sehr gut.</div>`;
  if(act.avg_power&&act.avg_power<FTP*0.75)h+=`<div class="insight good"><strong>Z2-Einheit:</strong> Ø ${act.avg_power}W — genau richtig für Phase 1.</div>`;
  if(!act.gps_ok)h+=`<div class="insight warn"><strong>GPS unvollständig:</strong> ${act.gps_coverage_pct}% der Fahrt getrackt. Distanz nicht zuverlässig.</div>`;
  return h;
}


// ── ANALYSIS CHARTS (dual timeseries + rolling EF) ──
function drawAnalysis(act){
  if(!act.streams)return;
  const durMin=actDur(act)/60;
  if(durMin<30||!act.streams.watts||!act.streams.hr)return;
  const ts=act.streams.time||[],pw=act.streams.watts||[],hr=act.streams.hr||[];
  if(!ts.length)return;

  const totalMin=ts[ts.length-1]/60;
  const trimStart=3, trimEnd=Math.max(totalMin-5,totalMin*0.75);

  // Full dataset (every 5th)
  const raw=[];
  for(let i=0;i<ts.length;i+=5){
    if(pw[i]>10&&hr[i]>50) raw.push({t:ts[i]/60,w:pw[i],hr:hr[i]});
  }

  // Trimmed for EF/scatter
  const trimmed=raw.filter(p=>p.t>=trimStart&&p.t<=trimEnd);
  const half=Math.floor(trimmed.length/2);
  const t1=trimmed.slice(0,half),t2=trimmed.slice(half);
  const ef1v=t1.length?(t1.reduce((s,p)=>s+p.w,0)/t1.length)/(t1.reduce((s,p)=>s+p.hr,0)/t1.length):0;
  const ef2v=t2.length?(t2.reduce((s,p)=>s+p.w,0)/t2.length)/(t2.reduce((s,p)=>s+p.hr,0)/t2.length):0;
  const drift=ef1v?((ef2v-ef1v)/ef1v*100):0;
  const halfT=trimmed[half]?.t||totalMin/2;

  // Rolling EF (30s)
  const efSeries=[];
  for(let i=30;i<ts.length;i+=5){
    const ws=pw.slice(i-30,i).filter(v=>v>10);
    const hs=hr.slice(i-30,i).filter(v=>v>50);
    if(!ws.length||!hs.length)continue;
    const np4=(ws.reduce((s,v)=>s+v**4,0)/ws.length)**0.25;
    const hrA=hs.reduce((s,v)=>s+v,0)/hs.length;
    efSeries.push({t:ts[i]/60,ef:np4/hrA});
  }
  const efTrimmed=efSeries.filter(p=>p.t>=trimStart&&p.t<=trimEnd);
  const avgEF=efTrimmed.length?efTrimmed.reduce((s,p)=>s+p.ef,0)/efTrimmed.length:1.2;

  const c1=document.getElementById('an-dual-'+act.id);
  const c2=document.getElementById('an-ef-'+act.id);
  const c3=document.getElementById('an-sc-'+act.id);
  if(!c1||!c2||!c3)return;

  function setupCanvas(c,h){
    const dpr=window.devicePixelRatio||1;
    const W=Math.floor(c.parentElement.clientWidth-2); // clientWidth avoids scrollbar, -2 for safety
    c.width=W*dpr; c.height=h*dpr;
    c.style.width=W+'px'; c.style.height=h+'px';
    const ctx=c.getContext('2d'); ctx.scale(dpr,dpr);
    return{ctx,W,H:h};
  }

  // ── DUAL CHART ──
  {
    const {ctx,W,H}=setupCanvas(c1,160);
    const pL=38,pR=42,pT=18,pB=22,cW=W-pL-pR,cH=H-pT-pB;
    const maxT=raw.length?raw[raw.length-1].t:totalMin;
    const minW=50,maxWv=Math.max(250,...raw.map(p=>p.w));
    const minHv=Math.max(60,Math.min(...raw.filter(p=>p.hr>60).map(p=>p.hr))-5);
    const maxHv=Math.min(185,Math.max(...raw.map(p=>p.hr))+5);

    function xOf(t){return pL+(t/maxT)*cW;}
    function yW(w){return pT+cH-(w-minW)/(maxWv-minW)*cH;}
    function yH(h){return pT+cH-(h-minHv)/(maxHv-minHv)*cH;}

    // Grid
    ctx.strokeStyle='#1e1e1e';ctx.lineWidth=1;
    const ticks=Math.min(8,Math.floor(maxT/5));
    for(let i=0;i<=ticks;i++){const t=Math.round(i*maxT/ticks);ctx.beginPath();ctx.moveTo(xOf(t),pT);ctx.lineTo(xOf(t),pT+cH);ctx.stroke();}
    [100,150,200,250].filter(w=>w>=minW&&w<=maxWv).forEach(w=>{ctx.beginPath();ctx.moveTo(pL,yW(w));ctx.lineTo(pL+cW,yW(w));ctx.stroke();});

    // Trim shading
    ctx.fillStyle='rgba(255,255,255,0.02)';
    ctx.fillRect(xOf(trimStart),pT,xOf(trimEnd)-xOf(trimStart),cH);

    // Half line
    ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.setLineDash([4,5]);
    ctx.beginPath();ctx.moveTo(xOf(halfT),pT);ctx.lineTo(xOf(halfT),pT+cH);ctx.stroke();
    ctx.setLineDash([]);

    // Annotations
    ctx.font='9px monospace';ctx.textAlign='center';
    const driftOk=Math.abs(drift)<5;
    if(ef1v){ctx.fillStyle='rgba(255,255,255,0.22)';ctx.fillText(`EF₁ ${ef1v.toFixed(2)}`,xOf((trimStart+halfT)/2),pT+12);}
    if(ef2v){ctx.fillStyle='rgba(255,255,255,0.22)';ctx.fillText(`EF₂ ${ef2v.toFixed(2)}`,xOf((halfT+trimEnd)/2),pT+12);}
    ctx.fillStyle=driftOk?'#5a8a52':'#a08060';
    ctx.fillText(`Δ ${drift.toFixed(1)}%`,xOf(halfT),pT+12);

    // Power
    ctx.beginPath();
    raw.forEach((p,i)=>{i===0?ctx.moveTo(xOf(p.t),yW(p.w)):ctx.lineTo(xOf(p.t),yW(p.w));});
    ctx.strokeStyle='rgba(249,115,22,0.75)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.lineTo(xOf(maxT),yW(minW));ctx.lineTo(xOf(0),yW(minW));ctx.closePath();
    ctx.fillStyle='rgba(249,115,22,0.08)';ctx.fill();

    // HR
    ctx.beginPath();
    raw.forEach((p,i)=>{i===0?ctx.moveTo(xOf(p.t),yH(p.hr)):ctx.lineTo(xOf(p.t),yH(p.hr));});
    ctx.strokeStyle='rgba(180,180,180,0.7)';ctx.lineWidth=1.5;ctx.stroke();

    // Y labels left (W)
    ctx.fillStyle='rgba(249,115,22,0.55)';ctx.font='9px monospace';ctx.textAlign='right';
    [100,150,200].filter(w=>w>=minW&&w<=maxWv).forEach(w=>ctx.fillText(w+'W',pL-3,yW(w)+3));
    // Y labels right (HR)
    ctx.fillStyle='rgba(180,180,180,0.5)';ctx.textAlign='left';
    [Math.round(minHv+5),Math.round((minHv+maxHv)/2),Math.round(maxHv-5)].forEach(h=>ctx.fillText(h,W-pR+3,yH(h)+3));
    // X labels
    ctx.fillStyle='#3a3a3a';ctx.textAlign='center';
    for(let i=0;i<=ticks;i++){const t=Math.round(i*maxT/ticks);ctx.fillText(Math.round(t)+"'",xOf(t),H-5);}
    ctx.fillStyle='rgba(249,115,22,0.55)';ctx.font='9px sans-serif';ctx.textAlign='left';ctx.fillText('Watt',pL+4,pT+23);
    ctx.fillStyle='rgba(180,180,180,0.5)';ctx.fillText('HR',pL+4,pT+33);
  }

  // ── EF CHART ──
  {
    const {ctx,W,H}=setupCanvas(c2,140);
    const pL=38,pR=42,pT=8,pB=22,cW=W-pL-pR,cH=H-pT-pB;
    const maxT=efSeries.length?efSeries[efSeries.length-1].t:totalMin;
    const efVals=efSeries.map(p=>p.ef);
    const minEF=Math.max(0.8,Math.min(...efVals)-0.05);
    const maxEF=Math.max(...efVals)+0.05;

    function xOf(t){return pL+(t/maxT)*cW;}
    function yEF(e){return pT+cH-(e-minEF)/(maxEF-minEF)*cH;}

    ctx.strokeStyle='#1e1e1e';ctx.lineWidth=1;
    const ticks=Math.min(8,Math.floor(maxT/5));
    for(let i=0;i<=ticks;i++){const t=Math.round(i*maxT/ticks);ctx.beginPath();ctx.moveTo(xOf(t),pT);ctx.lineTo(xOf(t),pT+cH);ctx.stroke();}

    // Avg EF ref line
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.setLineDash([4,6]);
    ctx.beginPath();ctx.moveTo(pL,yEF(avgEF));ctx.lineTo(pL+cW,yEF(avgEF));ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(255,255,255,0.18)';ctx.font='9px monospace';ctx.textAlign='left';
    ctx.fillText('Ø '+avgEF.toFixed(2),pL+4,yEF(avgEF)-3);

    ctx.fillStyle='rgba(90,138,82,0.05)';
    ctx.fillRect(pL,yEF(maxEF),cW,yEF(avgEF)-yEF(maxEF));

    ctx.beginPath();
    efSeries.forEach((p,i)=>{i===0?ctx.moveTo(xOf(p.t),yEF(p.ef)):ctx.lineTo(xOf(p.t),yEF(p.ef));});
    ctx.strokeStyle='rgba(96,165,250,0.8)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.lineTo(xOf(maxT),yEF(minEF));ctx.lineTo(xOf(0),yEF(minEF));ctx.closePath();
    ctx.fillStyle='rgba(96,165,250,0.07)';ctx.fill();

    const efRange=maxEF-minEF;
    [0,0.33,0.67,1].map(f=>minEF+f*efRange).forEach(e=>{
      ctx.fillStyle='rgba(96,165,250,0.45)';ctx.font='9px monospace';ctx.textAlign='right';
      ctx.fillText(e.toFixed(2),pL-3,yEF(e)+3);
    });
    ctx.fillStyle='#3a3a3a';ctx.textAlign='center';
    for(let i=0;i<=ticks;i++){const t=Math.round(i*maxT/ticks);ctx.fillText(Math.round(t)+"'",xOf(t),H-5);}
    ctx.fillStyle='rgba(96,165,250,0.55)';ctx.font='9px sans-serif';ctx.textAlign='left';ctx.fillText('EF (W/bpm)',pL+4,pT+14);
  }

  // ── SCATTER CHART (trimmed block only) ──
  {
    const {ctx,W,H}=setupCanvas(c3,130);
    const pL=38,pR=10,pT=10,pB=22,cW=W-pL-pR,cH=H-pT-pB;
    if(!trimmed.length)return;
    const wVals=trimmed.map(p=>p.w), hVals=trimmed.map(p=>p.hr);
    const minW=Math.max(60,Math.min(...wVals)-10), maxW=Math.max(...wVals)+10;
    const minH=Math.max(60,Math.min(...hVals)-5), maxH=Math.max(...hVals)+5;

    function xOf(w){return pL+(w-minW)/(maxW-minW)*cW;}
    function yOf(h){return pT+cH-(h-minH)/(maxH-minH)*cH;}

    ctx.strokeStyle='#1e1e1e';ctx.lineWidth=1;
    const wStep=Math.round((maxW-minW)/4/10)*10||10;
    for(let w=Math.ceil(minW/wStep)*wStep;w<=maxW;w+=wStep){ctx.beginPath();ctx.moveTo(xOf(w),pT);ctx.lineTo(xOf(w),pT+cH);ctx.stroke();}
    const hStep=5;
    for(let h=Math.ceil(minH/hStep)*hStep;h<=maxH;h+=hStep){ctx.beginPath();ctx.moveTo(pL,yOf(h));ctx.lineTo(pL+cW,yOf(h));ctx.stroke();}

    // Points colored by time
    const tMin=trimmed[0].t, tMax=trimmed[trimmed.length-1].t;
    trimmed.forEach(p=>{
      const tf=(p.t-tMin)/(tMax-tMin);
      const r=Math.round(96+tf*(249-96)), g=Math.round(165+tf*(115-165)), b=Math.round(250+tf*(22-250));
      ctx.beginPath();ctx.arc(xOf(p.w),yOf(p.hr),2.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r},${g},${b},0.7)`;ctx.fill();
    });

    // Labels
    ctx.fillStyle='rgba(96,165,250,0.45)';ctx.font='9px monospace';ctx.textAlign='right';
    for(let h=Math.ceil(minH/hStep)*hStep;h<=maxH;h+=hStep) ctx.fillText(h,pL-3,yOf(h)+3);
    ctx.fillStyle='#3a3a3a';ctx.textAlign='center';
    for(let w=Math.ceil(minW/wStep)*wStep;w<=maxW;w+=wStep) ctx.fillText(w+'W',xOf(w),H-5);
    ctx.fillStyle='rgba(180,180,180,0.4)';ctx.font='9px sans-serif';ctx.textAlign='left';ctx.fillText('HR vs Watt · Kernteil',pL+4,pT+12);
    ctx.fillStyle='rgba(96,165,250,0.4)';ctx.fillText(' (blau früh → orange spät)',pL+90,pT+12);
  }
}

// ── CHART ──
function drawChart(act){
  const canvas=document.getElementById(`chart-${act.id}`);
  if(!canvas||!act.streams)return;
  const ts=act.streams.time||[],pw=act.streams.watts||[],hr=act.streams.hr||[];
  if(!ts.length)return;
  const dpr=window.devicePixelRatio||1,W=canvas.parentElement.offsetWidth,H=90;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const pL=36,pR=8,pT=10,pB=22,cW=W-pL-pR,cH=H-pT-pB;
  const maxT=ts[ts.length-1]||1,maxP=pw.length?Math.max(600,...pw):600,minH=80,maxH=175;
  function xOf(t){return pL+(t/maxT)*cW;}
  function yP(p){return pT+cH-(p/maxP)*cH;}
  function yH(h){return pT+cH-((h-minH)/(maxH-minH))*cH;}
  ctx.strokeStyle='#333';ctx.lineWidth=1;
  [100,200,300,400,500].forEach(p=>{if(!pw.length)return;ctx.beginPath();ctx.moveTo(pL,yP(p));ctx.lineTo(pL+cW,yP(p));ctx.stroke();ctx.fillStyle='#555';ctx.font='8px monospace';ctx.textAlign='right';ctx.fillText(p,pL-3,yP(p)+3);});
  if(pw.length){
    ctx.strokeStyle='rgba(180,180,180,0.25)';ctx.lineWidth=1;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.moveTo(pL,yP(FTP));ctx.lineTo(pL+cW,yP(FTP));ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='rgba(180,180,180,0.4)';ctx.font='8px monospace';ctx.textAlign='left';ctx.fillText('FTP',pL+2,yP(FTP)-2);
    ctx.fillStyle='rgba(176,176,176,0.1)';ctx.strokeStyle='rgba(176,176,176,0.7)';ctx.lineWidth=1.5;ctx.beginPath();
    ts.forEach((t,i)=>{const x=xOf(t),y=yP(pw[i]||0);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.stroke();ctx.lineTo(xOf(maxT),yP(0));ctx.lineTo(xOf(0),yP(0));ctx.closePath();ctx.fill();
  }
  if(hr.length){
    ctx.strokeStyle='rgba(136,136,136,0.6)';ctx.lineWidth=1.5;ctx.beginPath();
    ts.forEach((t,i)=>{if(!hr[i]||hr[i]<50)return;const x=xOf(t),y=yH(hr[i]);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.stroke();
  }
  ctx.fillStyle='#555';ctx.font='8px monospace';ctx.textAlign='center';
  const ticks=Math.min(6,Math.floor(maxT/60));
  for(let i=0;i<=ticks;i++){const t=Math.round(i*maxT/ticks);ctx.fillText(Math.round(t/60)+"'",xOf(t),H-5);}
}



// ── LOAD ──
async function loadData(){
  try{
    const r=await fetch('data/activities.json?_='+Date.now());
    const data=await r.json();
    document.getElementById('loading').style.display='none';
    allActivities=data.activities||[];
    const upd=new Date(data.updated_at);
    document.getElementById('updated-at').textContent='Stand: '+upd.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    renderSummary();
    renderActivityList();
  }catch(e){
    document.getElementById('loading').textContent='Fehler: '+e.message;
  }
}

try{renderPlan();}catch(e){document.getElementById('page-plan').innerHTML='<div style="color:#a06060;padding:20px;font-size:12px">Plan-Fehler: '+e.message+'<br>'+e.stack+'</div>';}
loadData();
setInterval(loadData,5*60*1000);
</script>
