<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Tokens ───────────────────────────────────────────────────────────────
   Farben stehen NUR hier und in CFG.zones. Kein Hex im JS ausser den
   Zonenfarben, die aus der Config kommen. */
:root{
  --bg:#0d0d0d; --bg2:#161616; --bg3:#1c1c1c; --border:#2a2a2a; --border2:#333;
  --t1:#e8e8e8; --t2:#b0b0b0; --t3:#888; --t4:#666; --t5:#4a4a4a;
  --ok:#34d399; --warn:#fbbf24; --err:#ef4444; --accent:#60a5fa;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --sans:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
b{font-weight:600}
small{font-size:.75em;color:var(--t4)}
.muted{color:var(--t4);font-size:11px}
.big{font-size:30px;font-weight:800;font-family:var(--mono);line-height:1}
.lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t4);margin-bottom:7px;font-weight:600}

/* ── Nav ─────────────────────────────────────────────────────────────────── */
nav{background:var(--bg3);height:52px;display:flex;align-items:center;gap:24px;
    padding:0 18px;border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:100}
.brand{font-size:13px;font-weight:700;letter-spacing:.04em}
.tabs{display:flex;margin-left:auto;gap:2px}
.tab{background:none;border:none;color:var(--t3);font:inherit;font-size:13px;
     padding:8px 14px;cursor:pointer;border-radius:4px}
.tab:hover{color:var(--t1);background:var(--bg2)}
.tab.on{color:var(--t1);background:var(--bg2);font-weight:600}

/* Status-Ampel */
.nav-status{position:relative;cursor:pointer;display:flex;align-items:center;gap:7px;
            font-family:var(--mono);font-size:11px;color:var(--t4);user-select:none}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot.ok{background:var(--ok);box-shadow:0 0 6px rgba(52,211,153,.5)}
.dot.warn{background:var(--warn);box-shadow:0 0 6px rgba(251,191,36,.5)}
.dot.err{background:var(--err);box-shadow:0 0 6px rgba(239,68,68,.6)}
.status-panel{position:absolute;top:26px;right:0;background:var(--bg2);border:1px solid var(--border);
              border-radius:8px;padding:12px 14px;min-width:250px;z-index:200;display:none;
              box-shadow:0 8px 24px rgba(0,0,0,.5)}
.status-panel.open{display:block}
.sp-row{display:flex;justify-content:space-between;gap:14px;padding:5px 0;font-size:11px}
.sp-row .val{font-family:var(--mono);font-weight:600}
.sp-hint{font-size:10px;color:var(--t5);margin-top:8px;padding-top:8px;
         border-top:1px solid var(--border);line-height:1.5}

/* ── Layout ──────────────────────────────────────────────────────────────── */
main{max-width:1180px;margin:0 auto;padding:18px}
.page{display:none}
.page.on{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;
      padding:16px 18px;margin-bottom:14px}
.card-hd{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
.card-hd .t{font-size:12px;font-weight:700;letter-spacing:.06em}
.card-hd .s{font-size:11px;color:var(--t4)}

/* ── Zonenbalken (ueberall gleich) ───────────────────────────────────────── */
.zbar{display:flex;height:3px;border-radius:2px;overflow:hidden;margin-top:5px;background:#222}
.zbar div{height:100%}

/* ── 4DP-Ringe ───────────────────────────────────────────────────────────── */
.dp4{flex-shrink:0;line-height:0;margin-left:8px}
.dp4 svg{transform:rotate(-90deg);display:block}

/* ── FTP-Widget ──────────────────────────────────────────────────────────── */
.ftp3-grid{display:grid;grid-template-columns:1fr 1fr;gap:26px}
@media(max-width:840px){.ftp3-grid{grid-template-columns:1fr}}
.ez-item{margin-bottom:14px}
.ez-head{display:flex;justify-content:space-between;align-items:baseline}
.ez-name{font-size:12px;color:var(--t2)}
.ez-val{font-size:22px;font-weight:800;font-family:var(--mono)}
.ez-bar{position:relative;height:12px;background:#222;border-radius:3px;margin:6px 0 4px;overflow:hidden}
.ez-fill{position:absolute;left:0;top:0;bottom:0;border-radius:3px}
.ez-tgt{position:absolute;top:0;bottom:0;background:rgba(52,211,153,.14);
        border-left:1px solid var(--ok);border-right:1px solid var(--ok)}
.ez-hint{font-size:10.5px;color:var(--t4);line-height:1.5}
.ez-meta{font-size:11px;color:var(--t4);font-family:var(--mono);margin-top:10px}
.ez-none{font-size:11px;color:var(--t5);font-style:italic;margin-bottom:12px}
.tst-row{display:flex;align-items:flex-end;gap:14px}
.tst-list{font-size:10.5px;font-family:var(--mono);color:var(--t3);line-height:1.7}
.tst-list b{color:var(--t1)}

/* ── Plan ────────────────────────────────────────────────────────────────── */
.wcard{background:var(--bg2);border:1px solid var(--border);border-radius:8px;
       margin-bottom:12px;overflow:hidden}
.wcard.deload{border-color:#2f4030}
.wcard-hd{display:flex;align-items:baseline;gap:12px;padding:9px 14px;
          background:var(--bg3);border-bottom:1px solid var(--border);font-size:11px}
.wcard-hd .kw{font-family:var(--mono);font-weight:700;color:var(--accent)}
.wcard-hd .wlbl{font-weight:600;color:var(--t2)}
.wcard-hd .wdates{color:var(--t4);font-family:var(--mono)}
.wcard-hd .wvol{margin-left:auto;color:var(--t3);font-family:var(--mono)}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
@media(max-width:900px){.days{grid-template-columns:1fr 1fr}}
.day{background:var(--bg2);padding:8px 9px;min-height:92px;display:flex;flex-direction:column;gap:5px}
.day.past{opacity:.62}
.day.today{background:#17201a;box-shadow:inset 0 0 0 1px #2f5f3f}
.day.empty{opacity:.3}
.day-hd{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px}
.day-hd .dow{font-weight:700;color:var(--t2)}
.day-hd .dat{color:var(--t5)}
.p-part{border-left:2px solid var(--t5);padding-left:6px}
.p-part.t-comm{border-color:#3f6b52}
.p-part.t-roll{border-color:#d9673c}
.p-part.t-aus{border-color:#4a7fb5}
.p-part.t-rest{border-color:var(--t5)}
.p-title{font-size:11.5px;font-weight:600;line-height:1.3}
.p-desc{font-size:10px;color:var(--t4);line-height:1.4}
.ev-test{box-shadow:inset 0 0 0 1px #7a4bbd;background:#1a1526}
.ev-test .p-title{color:#c084fc}
.act{display:flex;align-items:flex-start;gap:4px}
.act-main{flex:1;min-width:0}
.act-name{font-size:11.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act-num{font-size:10px;color:var(--t3);font-family:var(--mono);line-height:1.5}
.act-num b{color:var(--t1)}
.was-planned{font-size:9.5px;color:var(--t5);font-style:italic;margin-top:auto}

/* ── Rides ───────────────────────────────────────────────────────────────── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.stat-l{font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--t4);font-weight:600}
.stat-v{font-size:24px;font-weight:800;font-family:var(--mono);margin-top:3px}
.stat-s{font-size:10px;color:var(--t5);font-family:var(--mono)}
.rrow{background:var(--bg2);border:1px solid var(--border);border-radius:6px;margin-bottom:5px;
      cursor:pointer;transition:border-color .12s}
.rrow:hover{border-color:var(--border2)}
.rrow.on{border-color:#4a5a6a}
.rmain{display:flex;align-items:center;gap:14px;padding:10px 13px}
.rdate{font-family:var(--mono);font-size:10.5px;color:var(--t4);width:96px;flex-shrink:0}
.rname{font-size:12.5px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rmet{display:flex;gap:11px;font-family:var(--mono);font-size:11px;color:var(--t3);flex-shrink:0}
.rmet b{color:var(--t1)}
.rdet{border-top:1px solid var(--border);padding:14px;display:none}
.rdet.on{display:block}
.chartbox{position:relative;width:100%;margin-bottom:12px}
.chartbox canvas{width:100%;display:block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:840px){.grid2{grid-template-columns:1fr}}

/* ── Form ────────────────────────────────────────────────────────────────── */
.hrow{display:grid;grid-template-columns:96px repeat(4,1fr);gap:10px;padding:7px 12px;
      background:var(--bg2);border:1px solid var(--border);border-radius:6px;margin-bottom:4px;
      font-family:var(--mono);font-size:11px;align-items:center}
.hrow .hd{color:var(--t4)}
.hval b{color:var(--t1);font-weight:700}

/* ── Zonen-Editor ────────────────────────────────────────────────────────── */
.zed{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.zed label{font-size:10px;color:var(--t4);display:block;margin-bottom:3px}
.zed input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;
           color:var(--t1);font-family:var(--mono);font-size:12px;padding:5px 7px}
.zed .note{font-size:10px;color:var(--t5);margin-top:8px;line-height:1.5}
#loading{padding:40px;text-align:center;color:var(--t4);font-family:var(--mono);font-size:12px}
</style>
</head>
<body>

<nav>
  <span class="brand">TRAINING</span>
  <div class="nav-status" id="nav-status" onclick="toggleStatus(event)">
    <span class="dot ok" id="status-dot"></span>
    <span id="status-sum">…</span>
    <div class="status-panel" id="status-panel"></div>
  </div>
  <div class="tabs">
    <button class="tab on" data-p="plan"  onclick="showPage('plan',this)">Plan</button>
    <button class="tab"    data-p="rides" onclick="showPage('rides',this)">Rides</button>
    <button class="tab"    data-p="form"  onclick="showPage('form',this)">Form</button>
  </div>
</nav>

<main>
  <div id="loading">lade …</div>
  <div class="page on" id="page-plan"></div>
  <div class="page"    id="page-rides"></div>
  <div class="page"    id="page-form"></div>
</main>

<script src="js/config.js"></script>
<script src="js/shared.js"></script>
<script src="js/plan.js"></script>
<script src="js/rides.js"></script>
<script src="js/form.js"></script>
<script>
function showPage(name, btn){
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('on', p.id === 'page-' + name));
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t === btn));
  // Kein Auto-Scroll: der aktuelle Tag steht auf jeder Seite oben.
  window.scrollTo({ top: 0 });
}

// ── Status-Ampel ──────────────────────────────────────────────────────────
function toggleStatus(ev){
  ev.stopPropagation();
  $('#status-panel').classList.toggle('open');
}
document.addEventListener('click', e => {
  const s = $('#nav-status');
  if (s && !s.contains(e.target)) $('#status-panel').classList.remove('open');
});

function renderStatus(){
  const st = CFG.ui.status;
  const fetchAge = DATA.updatedAt ? (Date.now() - new Date(DATA.updatedAt)) / 3600000 : Infinity;
  const hDay = DATA.health.length ? dayDiff(today(), d(DATA.health[0].date)) : Infinity;
  const aDay = DATA.acts.length   ? dayDiff(today(), d(DATA.acts[0].date))   : Infinity;

  const lvl = (hDay >= st.healthErrDays || fetchAge >= st.fetchErrH) ? 'err'
            : (hDay >= st.healthWarnDays || fetchAge >= st.fetchWarnH) ? 'warn' : 'ok';
  $('#status-dot').className = 'dot ' + lvl;
  $('#status-sum').textContent = lvl === 'err' ? 'Daten hängen' : lvl === 'warn' ? 'Daten verspätet' : 'aktuell';

  const ago = n => n <= 0 ? 'heute' : n === 1 ? 'gestern' : isFinite(n) ? `vor ${n} Tagen` : '—';
  const stamp = iso_ => {
    if (!iso_) return 'nie';
    const t = new Date(iso_), dd = dayDiff(today(), d(t.toISOString()));
    const hm = t.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    return (dd <= 0 ? 'heute' : dd === 1 ? 'gestern' : fmtDay(t)) + ' ' + hm;
  };
  const cF = fetchAge >= st.fetchErrH ? 'err' : fetchAge >= st.fetchWarnH ? 'warn' : 'ok';
  const cH = hDay >= st.healthErrDays ? 'err' : hDay >= st.healthWarnDays ? 'warn' : 'ok';
  const col = c => c === 'err' ? 'var(--err)' : c === 'warn' ? 'var(--warn)' : 'var(--ok)';
  const hint = hDay >= st.healthWarnDays
    ? 'Health hängt. Garmin-Token prüfen: refresh.log auf ukb457.'
    : fetchAge >= st.fetchWarnH
    ? 'Fetch läuft nicht. cron-job.org und GitHub Actions prüfen.'
    : 'Fetch alle 15 Min · Health täglich · Aktivitäten nach dem Fahren.';

  $('#status-panel').innerHTML = `
    <div class="sp-row"><span style="color:${col(cF)}">Letzter Fetch</span><span class="val">${stamp(DATA.updatedAt)}</span></div>
    <div class="sp-row"><span style="color:${col(cH)}">Health-Daten</span><span class="val">${ago(hDay)}</span></div>
    <div class="sp-row"><span style="color:var(--ok)">Letzte Aktivität</span><span class="val">${ago(aDay)}</span></div>
    <div class="sp-hint">${hint}</div>`;
}

// ── Start ─────────────────────────────────────────────────────────────────
(async () => {
  try {
    await loadAll();
    $('#loading').style.display = 'none';
    renderStatus();
    renderPlan();
    renderRides();
    renderForm();
  } catch (e) {
    $('#loading').textContent = 'Fehler beim Laden: ' + e.message;
    console.error(e);
  }
})();
</script>
</body>
</html>
