name: Wahoo Compare Test

on:
  workflow_dispatch:

jobs:
  compare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Refresh Wahoo Token
        id: wahoo_token
        run: |
          RESPONSE=$(curl -s --retry 3 --retry-delay 5 -X POST https://api.wahooligan.com/oauth/token \
            -d client_id=${{ secrets.WAHOO_CLIENT_ID }} \
            -d client_secret=${{ secrets.WAHOO_CLIENT_SECRET }} \
            -d refresh_token=${{ secrets.WAHOO_REFRESH_TOKEN }} \
            -d grant_type=refresh_token)
          ACCESS=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))")
          NEW_REFRESH=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin).get('refresh_token',''))")
          echo "wahoo_access=$ACCESS" >> $GITHUB_OUTPUT
          echo "WAHOO_NEW_REFRESH=$NEW_REFRESH" >> $GITHUB_ENV

      - name: Update Wahoo Refresh Token
        if: env.WAHOO_NEW_REFRESH != ''
        run: gh secret set WAHOO_REFRESH_TOKEN --body "$WAHOO_NEW_REFRESH"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Install deps
        run: pip install fitparse

      - name: Run comparison
        run: python3 scripts/wahoo_compare.py
        env:
          WAHOO_ACCESS_TOKEN: ${{ steps.wahoo_token.outputs.wahoo_access }}

      - name: Commit comparison result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wahoo_compare.json
          git diff --staged --quiet || git commit -m "wahoo comparison test $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase -X ours origin main
          git push
